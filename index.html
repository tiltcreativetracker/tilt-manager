<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tilt // Video Campaign Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0b0e; --bg2: #131318; --bg3: #1a1a22; --bg4: #25252f;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text1: #f0eefc; --text2: #a09db8; --text3: #6b6880;
    --accent: #7f77dd; --accent2: #afa9ec; --accent-dim: rgba(127,119,221,0.12);
    --green: #1d9e75; --green-bg: #04342c; --green-text: #5dcaa5;
    --amber-bg: #412402; --amber-text: #fac775;
    --red: #e24b4a; --red-bg: #501313; --red-text: #f09595;
    --blue-bg: #042c53; --blue-text: #85b7eb;
    --gray-bg: #2c2c2a; --gray-text: #b4b2a9;
    --pink-bg: #4b1528; --pink-text: #f4c0d1;
  }
  body { font-family: 'Inter Tight', system-ui, sans-serif; background: var(--bg); color: var(--text1); height: 100vh; overflow: hidden; font-size: 14px; -webkit-font-smoothing: antialiased; }
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar { display: flex; align-items: center; gap: 20px; padding: 10px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-size: 14px; font-weight: 700; color: var(--text1); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 2px; box-shadow: 0 0 8px rgba(127,119,221,0.6); }
  .logo span { color: var(--text3); font-weight: 400; }
  .topbar-tabs { display: flex; gap: 2px; margin-left: 16px; }
  .tab-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; background: transparent; color: var(--text2); transition: all 0.12s; position: relative; }
  .tab-btn:hover { background: var(--bg3); color: var(--text1); }
  .tab-btn.active { background: var(--bg3); color: var(--accent2); }
  .tab-badge { display: inline-block; padding: 1px 5px; border-radius: 8px; font-size: 9.5px; font-weight: 700; background: var(--accent); color: #fff; margin-left: 4px; font-family: 'JetBrains Mono', monospace; min-width: 14px; text-align: center; }
  .tab-badge.alert { background: var(--amber-text); color: var(--amber-bg); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-text); box-shadow: 0 0 6px var(--green-text); }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 14px 14px 8px; display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-size: 10.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }

  .country-group { margin-bottom: 4px; }
  .country-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; transition: background 0.1s; border-radius: 6px; margin: 0 8px 2px; }
  .country-row:hover { background: var(--bg3); }
  .country-chevron { color: var(--text3); font-size: 10px; flex-shrink: 0; transition: transform 0.15s; width: 10px; font-family: 'JetBrains Mono', monospace; }
  .country-flag { width: 26px; height: 18px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }
  .flag-UK { background: linear-gradient(135deg, #012169 50%, #c8102e 50%); color: #fff; }
  .flag-ES { background: linear-gradient(180deg, #aa151b 33%, #f1bf00 33%, #f1bf00 66%, #aa151b 66%); color: #000; }
  .flag-IT { background: linear-gradient(90deg, #008c45 33%, #f4f5f0 33%, #f4f5f0 66%, #cd212a 66%); color: #000; }
  .flag-PL { background: linear-gradient(180deg, #fff 50%, #dc143c 50%); color: #dc143c; }
  .country-name { font-size: 13px; font-weight: 600; color: var(--text1); flex: 1; min-width: 0; white-space: nowrap; }
  .country-count { font-size: 10.5px; color: var(--text3); font-family: 'JetBrains Mono', monospace; padding: 1px 6px; background: var(--bg4); border-radius: 3px; flex-shrink: 0; }

  .subcamp-list { display: none; padding: 2px 0 4px; }
  .subcamp-list.open { display: block; }
  .subcamp-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px 6px 44px; cursor: pointer; transition: background 0.1s; margin: 0 8px 2px; border-radius: 6px; border: 1px solid transparent; position: relative; }
  .subcamp-item::before { content: ''; position: absolute; left: 24px; top: 0; bottom: 0; width: 1px; background: var(--border); }
  .subcamp-item:hover { background: var(--bg3); }
  .subcamp-item.active { background: var(--bg3); border-color: var(--border2); box-shadow: inset 3px 0 0 var(--accent); }
  .rank-badge { width: 20px; height: 20px; border-radius: 4px; background: var(--bg4); color: var(--text2); font-size: 10.5px; font-weight: 600; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .subcamp-item.active .rank-badge { background: var(--accent); color: #fff; }
  .subcamp-name { font-size: 12.5px; font-weight: 500; color: var(--text1); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-pill { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; letter-spacing: 0.04em; text-transform: uppercase; }
  .cat-Luxury { background: #3c3489; color: #d8d4ff; }
  .cat-Essentials { background: #0f6e56; color: #9fe1cb; }
  .cat-BTS { background: #633806; color: #fac775; }
  .add-sub-btn { margin: 4px 16px 6px 44px; padding: 5px 8px; border-radius: 5px; border: 1px dashed var(--border2); background: transparent; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; width: calc(100% - 60px); transition: all 0.12s; }
  .add-sub-btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
  .sidebar-scroll { flex: 1; overflow-y: auto; padding: 2px 0 8px; }
  .reorder-btn { margin: 0 12px 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; justify-content: center; transition: all 0.12s; }
  .reorder-btn:hover { background: var(--accent-dim); color: var(--accent2); border-color: var(--accent); }

  .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .camp-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .breadcrumb-flag-inline { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 14px; border-radius: 2px; font-size: 9px; font-weight: 700; }
  .breadcrumb-sep { color: var(--text3); }
  .breadcrumb-country { color: var(--text2); }
  .camp-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .camp-title { font-size: 18px; font-weight: 700; color: var(--text1); letter-spacing: -0.3px; }
  .camp-brief { font-size: 13px; color: var(--text2); line-height: 1.5; max-width: 640px; }
  .camp-meta { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .meta-chip { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border2); color: var(--text2); font-family: 'JetBrains Mono', monospace; display: inline-flex; align-items: center; gap: 5px; }
  .meta-chip-label { color: var(--text3); }
  .edit-btn { padding: 5px 11px; border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.12s; }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .edit-btn.ml-auto { margin-left: auto; }
  .del-camp-btn:hover { border-color: var(--red); color: var(--red-text); }

  .toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .search-wrap { position: relative; width: 220px; }
  .search-wrap input { width: 100%; padding: 7px 10px 7px 28px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text1); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.12s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; }
  .filter-select { padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-family: inherit; font-size: 13px; cursor: pointer; outline: none; }
  .filter-select:focus { border-color: var(--accent); }
  .count-chip { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; padding: 3px 8px; background: var(--bg3); border-radius: 4px; }
  .primary-btn { margin-left: auto; padding: 7px 14px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.12s; }
  .primary-btn:hover { opacity: 0.88; }

  .table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { position: sticky; top: 0; z-index: 2; background: var(--bg2); }
  th { padding: 9px 12px; text-align: left; font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border2); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:hover td { background: rgba(127,119,221,0.03); }
  .pn { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text3); }
  .video-name-cell { max-width: 220px; display: flex; align-items: center; gap: 6px; }
  .video-name-text { font-size: 13px; color: var(--text1); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'JetBrains Mono', monospace; }
  .version-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace; background: var(--accent-dim); color: var(--accent2); flex-shrink: 0; }
  .cat-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 3px; background: var(--amber-bg); color: var(--amber-text); }
  .link-cell a { font-size: 12px; color: var(--blue-text); text-decoration: none; font-family: 'JetBrains Mono', monospace; display: inline-flex; align-items: center; gap: 3px; }
  .link-cell a:hover { color: var(--accent2); }
  .no-link { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .editor-cell { display: flex; align-items: center; gap: 7px; }
  .editor-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .av-Zidni { background: #3c3489; color: var(--accent2); }
  .av-Patty { background: #085041; color: var(--green-text); }
  .av-Sharm { background: #633806; color: var(--amber-text); }
  .av-Elsa { background: #72243e; color: var(--pink-text); }
  .editor-name { font-size: 12px; color: var(--text1); }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .s-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .st-Approved { background: var(--green-bg); color: var(--green-text); }
  .st-For_Review { background: var(--blue-bg); color: var(--blue-text); }
  .st-Assigned { background: #3c3489; color: #d8d4ff; }
  .st-Draft { background: var(--gray-bg); color: var(--gray-text); }
  .st-Needs_Revisions { background: var(--red-bg); color: var(--red-text); }
  /* Inline status dropdown styled to match the badge colors */
  .status-select { appearance: none; -webkit-appearance: none; padding: 3px 22px 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: inherit; border: 1px solid transparent; cursor: pointer; outline: none; background-repeat: no-repeat; background-position: right 6px center; background-size: 8px; transition: filter 0.12s, box-shadow 0.12s; }
  .status-select:hover { filter: brightness(1.15); }
  .status-select:focus { box-shadow: 0 0 0 2px var(--accent-dim); }
  .status-select option { background: var(--bg3); color: var(--text1); }
  .status-select.st-Draft        { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%23b4b2a9'/></svg>"); }
  .status-select.st-Assigned     { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%23d8d4ff'/></svg>"); }
  .status-select.st-For_Review   { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%2385b7eb'/></svg>"); }
  .status-select.st-Needs_Revisions { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%23f09595'/></svg>"); }
  .status-select.st-Approved     { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%235dcaa5'/></svg>"); }
  .date-cell { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .eta-cell { font-size: 12px; color: var(--amber-text); font-family: 'JetBrains Mono', monospace; white-space: nowrap; font-weight: 500; }
  .sched-cell { font-size: 12px; color: var(--blue-text); font-family: 'JetBrains Mono', monospace; white-space: nowrap; font-weight: 500; }
  .released-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; background: var(--green-bg); color: var(--green-text); }
  .diff-badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10.5px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }
  .diff-Low { background: #04342c; color: #5dcaa5; }
  .diff-Moderate { background: #042c53; color: #85b7eb; }
  .diff-High { background: #412402; color: #fac775; }
  .diff-Max { background: #501313; color: #f09595; }
  .row-actions { display: flex; gap: 4px; }
  .action-btn { padding: 4px 9px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.12s; }
  .action-btn:hover { border-color: var(--border2); color: var(--text1); background: var(--bg3); }
  .del-btn:hover { border-color: var(--red); color: var(--red-text); background: var(--red-bg); }

  .scheduler-panel, .automation-panel, .config-panel, .notif-panel { padding: 24px 28px; overflow-y: auto; flex: 1; max-width: 1040px; width: 100%; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; margin-top: 8px; display: flex; align-items: center; gap: 8px; }
  .section-title:first-child { margin-top: 0; }
  .auto-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
  .auto-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .auto-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--accent-dim); color: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
  .auto-title { font-size: 14px; font-weight: 700; color: var(--text1); }
  .auto-sub { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
  .auto-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin: 8px 0; }
  .code-block { background: #07070a; border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #c3f0d9; line-height: 1.65; overflow-x: auto; white-space: pre; }
  .run-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--accent); background: var(--accent-dim); color: var(--accent2); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.12s; }
  .run-btn:hover { background: var(--accent); color: #fff; }
  .run-btn.secondary { border-color: var(--border2); color: var(--text2); background: transparent; }
  .run-btn.secondary:hover { border-color: var(--text2); color: var(--text1); background: var(--bg3); }
  .webhook-row { display: flex; gap: 8px; margin-top: 10px; }
  .webhook-row input { flex: 1; padding: 8px 10px; border-radius: 5px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text1); font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none; }
  .webhook-row input:focus { border-color: var(--accent); }
  .save-btn { padding: 8px 14px; border-radius: 5px; border: none; background: var(--accent); color: #fff; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .save-btn:hover { opacity: 0.9; }

  .cwh-row { display: flex; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .cwh-row:last-child { border-bottom: none; }
  .cwh-row .country-flag { flex-shrink: 0; }
  .cwh-row input { flex: 1; padding: 7px 10px; border-radius: 5px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text1); font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none; min-width: 0; }
  .cwh-row input:focus { border-color: var(--accent); }
  .cwh-row input.cwh-empty { color: var(--text3); }
  .cwh-row input.cwh-invalid { border-color: var(--red); color: var(--red-text); }
  .cwh-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--text3); box-shadow: 0 0 4px currentColor; }
  .cwh-dot.ok { background: var(--green-text); }
  .cwh-dot.bad { background: var(--red); }
  .cwh-row .save-btn, .cwh-row .edit-btn { padding: 6px 10px; font-size: 12px; flex-shrink: 0; }

  .scheduler-config-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
  .scheduler-date-pick { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); }
  .scheduler-date-pick input[type="date"] { padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text1); font-family: inherit; font-size: 13px; outline: none; color-scheme: dark; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; }
  .checkbox-row input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }

  .editor-plans { display: grid; gap: 12px; margin-top: 12px; }
  .editor-plan { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .editor-plan.alert { border-color: var(--red); background: rgba(226,75,74,0.04); }
  .editor-plan-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .editor-plan-header .editor-avatar { width: 30px; height: 30px; font-size: 11px; }
  .editor-plan-name { font-size: 14px; font-weight: 700; color: var(--text1); }
  .editor-plan-rules { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-left: auto; }
  .editor-plan-rules-inline { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .plan-slots { display: flex; flex-direction: column; gap: 6px; }
  .plan-slot { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--bg3); border-radius: 6px; border: 1px solid var(--border); }
  .plan-slot-num { width: 22px; height: 22px; border-radius: 4px; background: var(--bg4); color: var(--text2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  .plan-slot-name { font-size: 12px; color: var(--text1); font-weight: 500; font-family: 'JetBrains Mono', monospace; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .plan-slot-country { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }

<script>
"use strict";

window.addEventListener('error', function(e) {
  var app = document.getElementById('app');

    app.innerHTML = '<div style="padding:40px;color:#f09595;font-family:monospace;font-size:12px;">' +
      '<h2 style="margin-bottom:12px;color:#fff;font-family:sans-serif;">Runtime Error</h2>' +
      '<div><strong>Message:</strong> ' + (e.message || '(unknown)') + '</div>' +
      '<div><strong>Line:</strong> ' + (e.lineno || '?') + ':' + (e.colno || '?') + '</div>' +
      (e.error && e.error.stack ? '<pre style="margin-top:12px;white-space:pre-wrap;">' + e.error.stack + '</pre>' : '') +
    '</div>';
  }
});

// ===================== EDITOR RULES =====================

};
var EDITOR_AUTO_SCHEDULE = { Zidni: true, Sharm: true, Patty: true, Elsa: false };

// Batching thresholds
var BATCH_SIZE_LIMIT = 3;
var BATCH_TIME_LIMIT_MS = 30 * 60 * 1000; // 30 min

// ===================== STATE =====================

  activeSubCampaignId: 1,

  countries: [

  ],

    { id: 1, country: 'UK', rank: 1, name: 'Privilege Supply \u2013 Luxury', brief: 'High-end product showcase, tone = aspirational', driveId: '1a2B3cD4eF5gH6iJ', category: 'Luxury', slackOverride: '' },
    { id: 2, country: 'UK', rank: 2, name: 'Privilege Supply \u2013 Essentials', brief: 'Everyday essentials, tone = practical', driveId: '', category: 'Essentials', slackOverride: '' },
    { id: 3, country: 'ES', rank: 1, name: 'Lujo Privilegio \u2013 Primavera', brief: 'Spring luxury drop for the Spanish market (Zidni only)', driveId: '', category: 'Luxury', slackOverride: '' },
    { id: 4, country: 'IT', rank: 1, name: 'Privilege Supply \u2013 Moda', brief: 'Italian fashion-forward editorial cuts (Zidni only)', driveId: '', category: 'Luxury', slackOverride: '' },
    { id: 5, country: 'PL', rank: 1, name: 'Privilege Supply \u2013 Codzienny', brief: 'Polish everyday essentials launch (empty for now)', driveId: '', category: 'Essentials', slackOverride: '' }
  ],
  assets: seedAssets(),

  // Pending batches — in-memory queue per editor (reactive editor pings) and per country (PM review pings)
  pendingBatches: {
    Zidni: { items: [], firstQueuedAt: null },
    Sharm: { items: [], firstQueuedAt: null },
    Patty: { items: [], firstQueuedAt: null },
    Elsa:  { items: [], firstQueuedAt: null },
    'PM:UK': { items: [], firstQueuedAt: null },
    'PM:ES': { items: [], firstQueuedAt: null },

  },
  // Sent notifications history (for viewing in the Notifications tab)
  sentNotifications: [],

  activityLog: [
    { time: '00:00', tag: 'created', msg: 'Seeded 20 video assets with difficulty ratings' },
    { time: '00:00', tag: 'created', msg: '4 editors initialized (Zidni, Sharm, Patty, Elsa)' }
  ],
  nextAssetId: 21,
  nextCampaignId: 6,
  nextBatchItemId: 1
};

function todayISO() { return new Date().toISOString().slice(0, 10); }

function seedAssets() {
  var ukLux = [
    { name: 'Luxury_1N_PrivilegeSupply_ThisorThat_V1', ed: 'Patty',  df: 'Low'      },
    { name: 'Luxury_2N_PrivilegeSupply_GRWM_V1',       ed: 'Patty',  df: 'Low'      },

    { name: 'Luxury_13N_PrivilegeSupply_Collection_V2',ed: 'Zidni',  df: 'High'     },
    { name: 'Luxury_14N_PrivilegeSupply_Transformation_V1', ed: 'Zidni', df: 'Max'  },
    { name: 'Luxury_15N_PrivilegeSupply_Recap_V1',     ed: 'Sharm',  df: 'Moderate' }
  ];
  var esLux = [
    { name: 'Lujo_1N_Primavera_Intro_V1',    ed: 'Zidni', df: 'Moderate' },
    { name: 'Lujo_2N_Primavera_Showcase_V1', ed: 'Zidni', df: 'High'     },
    { name: 'Lujo_3N_Primavera_Story_V1',    ed: 'Zidni', df: 'Max'      }
  ];
  var itLux = [
    { name: 'Moda_1N_Editorial_V1', ed: 'Zidni', df: 'High' },

  ];
  var out = [], id = 1;
  ukLux.forEach(function(a, i) { out.push(mkAsset(id++, i+1, 1, a.name, a.ed, a.df, 'Apr 22, 2026', a.name.indexOf('V2') >= 0 ? 'V2' : 'V1')); });
  esLux.forEach(function(a, i) { out.push(mkAsset(id++, i+1, 3, a.name, a.ed, a.df, 'Apr 25, 2026', 'V1')); });
  itLux.forEach(function(a, i) { out.push(mkAsset(id++, i+1, 4, a.name, a.ed, a.df, 'Apr 26, 2026', 'V' + (i+1))); });

}

function mkAsset(id, pn, campaignId, name, editor, difficulty, estDelivery, version) {
  return {
    id: id, pn: pn, campaignId: campaignId, name: name, category: 'LUXURY',
    rawVideo: 'https://teamtilt.notion.site', editingBrief: '',
    editor: editor || '', difficulty: difficulty, finalVideo: '',
    estDelivery: estDelivery, dateApproved: '',
    scheduledFor: '', released: false,
    status: editor ? 'Assigned' : 'Draft', version: version
  };
}

// ===================== UTILITIES =====================
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(function() { t.className = 'toast'; }, 2800);
}

function timeStamp() {
  var d = new Date();
  var hh = String(d.getHours()); if (hh.length < 2) hh = '0' + hh;
  var mm = String(d.getMinutes()); if (mm.length < 2) mm = '0' + mm;
  return hh + ':' + mm;
}

function logAction(tag, msg) {
  STATE.activityLog.unshift({ time: timeStamp(), tag: tag, msg: msg });
  if (STATE.activityLog.length > 40) STATE.activityLog.pop();
  console.log('[notification system]', '[' + tag.toUpperCase() + ']', msg);
}

function openModal(html, onSubmit) {
  var ov = document.getElementById('modal-overlay');
  document.getElementById('modal').innerHTML = html;
  ov.classList.add('open');
  var cancel = document.getElementById('modal-cancel');
  if (cancel) cancel.addEventListener('click', closeModal);
  var submit = document.getElementById('modal-submit');
  if (submit) submit.addEventListener('click', onSubmit);
  setTimeout(function() {
    var el = document.querySelector('#modal input, #modal textarea, #modal select');
    if (el) el.focus();
  }, 50);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

function editorInitials(e) { return ({Zidni:'ZD', Patty:'PT', Sharm:'SH', Elsa:'EL'})[e] || '??'; }
function statusClass(s) { return 'st-' + s.replace(/ /g, '_'); }

// Build an inline <select> that matches the status badge colors and calls App.setAssetStatus on change.
function renderStatusSelect(asset) {
  var opts = STATUSES.map(function(s) {
    return '<option value="' + s + '"' + (s === asset.status ? ' selected' : '') + '>' + s + '</option>';
  }).join('');
  return '<select class="status-select ' + statusClass(asset.status) + '" ' +
         'onchange="App.setAssetStatus(' + asset.id + ', this.value)">' +
         opts + '</select>';
}

function getActiveCampaign() {
  for (var i = 0; i < STATE.campaigns.length; i++) {
    if (STATE.campaigns[i].id === STATE.activeSubCampaignId) return STATE.campaigns[i];
  }
  return null;
}

function getSubCampaignsForCountry(code) {
  return STATE.campaigns.filter(function(c) { return c.country === code; }).sort(function(a, b) { return a.rank - b.rank; });
}

function getCountryByCode(code) {
  for (var i = 0; i < STATE.countries.length; i++) if (STATE.countries[i].code === code) return STATE.countries[i];
  return null;
}

function findCampaignById(id) {
  for (var i = 0; i < STATE.campaigns.length; i++) if (STATE.campaigns[i].id === id) return STATE.campaigns[i];
  return null;
}

function getFilteredAssets() {
  var camp = getActiveCampaign();
  if (!camp) return [];
  var list = STATE.assets.filter(function(a) { return a.campaignId === camp.id; });
  if (STATE.search) {
    var q = STATE.search.toLowerCase();
    list = list.filter(function(a) {
      return a.name.toLowerCase().indexOf(q) >= 0
          || a.editor.toLowerCase().indexOf(q) >= 0
          || a.version.toLowerCase().indexOf(q) >= 0
          || a.status.toLowerCase().indexOf(q) >= 0
          || (a.difficulty || '').toLowerCase().indexOf(q) >= 0;
    });
  }
  if (STATE.statusFilter !== 'all') list = list.filter(function(a) { return a.status === STATE.statusFilter; });
  if (STATE.editorFilter !== 'all') list = list.filter(function(a) { return a.editor === STATE.editorFilter; });
  return list.sort(function(a, b) { return a.pn - b.pn; });
}

// ===================== NOTIFICATION BATCHING =====================
// Queue a notification. `recipient` is a batch key (editor name like 'Zidni' or 'PM:UK').
// `detail` is the already-formatted detail string to show under the item (e.g. raw+brief or Frame.io link).
function queueNotification(recipient, changeType, asset, detail) {
  if (!STATE.pendingBatches[recipient]) {
    STATE.pendingBatches[recipient] = { items: [], firstQueuedAt: null };
  }
  var batch = STATE.pendingBatches[recipient];
  var camp = findCampaignById(asset.campaignId);
  batch.items.push({
    id: STATE.nextBatchItemId++,
    assetId: asset.id,
    name: asset.name,
    country: camp ? camp.country : null,
    status: asset.status,
    editor: asset.editor || '',
    change: changeType,
    detail: detail || '',
    queuedAt: Date.now()
  });
  if (batch.firstQueuedAt === null) batch.firstQueuedAt = Date.now();

  logAction('queued', recipient + ': "' + asset.name + '" \u2014 ' + changeType + ' (batch ' + batch.items.length + '/' + BATCH_SIZE_LIMIT + ')');

  // Check if we should fire
  if (batch.items.length >= BATCH_SIZE_LIMIT) {
    fireBatch(recipient, 'size-limit');
  }
}

// Dispatcher: called from the asset modal on create/update. Looks at the change and queues the
// correct notifications based on the status rules (see project brief).
function emitAssetChangeNotifications(asset, ctx) {
  var oldEditor = ctx.oldEditor || '';
  var oldStatus = ctx.oldStatus;
  var newEditor = asset.editor || '';
  var newStatus = asset.status;
  var editorChanged = oldEditor !== newEditor;
  var statusChanged = oldStatus !== newStatus;

  // Rule: Assigned (editor newly assigned or reassigned) \u2014 ping editor with raw + brief
  // Fires when: new asset with editor, or editor changed (and someone is assigned), or status flipped to Assigned
  var justAssigned = (ctx.isNew && newEditor) || (editorChanged && newEditor) || (statusChanged && newStatus === 'Assigned' && newEditor);
  if (justAssigned) {
    var detailLines = [];
    if (asset.rawVideo)     detailLines.push('raw: ' + asset.rawVideo);
    if (asset.editingBrief) detailLines.push('brief: ' + asset.editingBrief);
    var assignedDetail = detailLines.length ? detailLines.join(' \u00B7 ') : '(no raw/brief links set)';
    queueNotification(newEditor, 'assigned', asset, assignedDetail);
  }

  // Rule: For Review \u2014 ping PM (country channel) with Frame.io link
  if (statusChanged && newStatus === 'For Review') {
    var camp = findCampaignById(asset.campaignId);
    var country = camp ? camp.country : null;
    if (country) {
      var reviewDetail = asset.finalVideo ? 'Frame.io: ' + asset.finalVideo : '(no Frame.io link set)';
      queueNotification('PM:' + country, 'for-review', asset, reviewDetail);
    }
  }

  // Rule: Needs Revisions \u2014 ping editor with Frame.io link (revision targets)
  if (statusChanged && newStatus === 'Needs Revisions' && newEditor) {
    var revDetail = asset.finalVideo ? 'Frame.io: ' + asset.finalVideo : '(no Frame.io link set)';
    queueNotification(newEditor, 'needs-revisions', asset, revDetail);
  }

  // Draft and Approved intentionally produce no notifications.
}

function fireBatch(recipient, reason) {
  var batch = STATE.pendingBatches[recipient];
  if (!batch || batch.items.length === 0) return false;
  var items = batch.items.slice(0, BATCH_SIZE_LIMIT);
  var remaining = batch.items.slice(BATCH_SIZE_LIMIT);

  var msg = buildBatchMessage(recipient, items);

  // Record as "sent"
  STATE.sentNotifications.unshift({
    time: timeStamp(),
    editor: recipient,
    items: items,
    reason: reason,
    body: msg
  });
  if (STATE.sentNotifications.length > 20) STATE.sentNotifications.pop();

  logAction('notified', recipient + ' \u2014 sent ' + items.length + ' update(s) to Slack (' + reason + ')');

  // Update batch state
  batch.items = remaining;
  batch.firstQueuedAt = remaining.length > 0 ? Date.now() : null;
  return true;
}

function clearBatch(recipient) {
  if (!STATE.pendingBatches[recipient]) return;
  var n = STATE.pendingBatches[recipient].items.length;
  STATE.pendingBatches[recipient] = { items: [], firstQueuedAt: null };
  logAction('deleted', recipient + ': cleared ' + n + ' pending notification(s)');
  toast('Cleared ' + n + ' pending notifications', 'success');
  render();
}

// Tick every 5s to check time limit + update countdowns
setInterval(function() {
  var nowTs = Date.now();
  var anyFired = false;
  Object.keys(STATE.pendingBatches).forEach(function(editor) {
    var batch = STATE.pendingBatches[editor];
    if (batch.items.length > 0 && batch.firstQueuedAt !== null) {
      if (nowTs - batch.firstQueuedAt >= BATCH_TIME_LIMIT_MS) {
        fireBatch(editor, 'time-limit');
        anyFired = true;
      }
    }
  });
  // Re-render notifications tab passively so countdown stays live
  if (STATE.tab === 'notifications' || anyFired) render();
}, 5000);

// ===================== SCHEDULER =====================
function isWeekend(isoDate) {
  var d = new Date(isoDate + 'T12:00:00');
  var day = d.getDay();
  return day === 0 || day === 6;
}

function priorityKey(asset) {
  var camp = findCampaignById(asset.campaignId);
  return { country: camp ? camp.country : 'ZZ', subRank: camp ? camp.rank : 999, pn: asset.pn };
}

function sortByPriority(assets, countryOrder) {
  var idx = {};
  countryOrder.forEach(function(c, i) { idx[c] = i; });
  return assets.slice().sort(function(a, b) {
    var ka = priorityKey(a), kb = priorityKey(b);
    var ia = idx[ka.country]; if (ia === undefined) ia = 999;
    var ib = idx[kb.country]; if (ib === undefined) ib = 999;
    if (ia !== ib) return ia - ib;
    if (ka.subRank !== kb.subRank) return ka.subRank - kb.subRank;
    return ka.pn - kb.pn;
  });
}

function computeDayPlan() {
  var plans = { Zidni: [], Sharm: [], Patty: [] };
  var alerts = [];
  var overflow = [];
  var used = {};

  function availableFor(editor) {
    return STATE.assets.filter(function(a) {
      if (used[a.id] || a.released || a.scheduledFor || a.status === 'Approved') return false;
      return a.editor === editor;
    });
  }

  ['Zidni', 'Sharm', 'Patty'].forEach(function(editor) {
    var rules = EDITOR_RULES[editor];
    var pool = sortByPriority(availableFor(editor), rules.countryOrder);
    var ideal = Object.assign({}, rules.idealMix);

    for (var d = 0; d < DIFFICULTIES.length; d++) {
      var diff = DIFFICULTIES[d];
      var need = ideal[diff] || 0;
      while (need > 0 && plans[editor].length < rules.cap) {
        var found = null;
        for (var i = 0; i < pool.length; i++) if (pool[i].difficulty === diff) { found = pool[i]; break; }
        if (!found) break;
        plans[editor].push(found);
        used[found.id] = true;
        pool = pool.filter(function(x) { return x.id !== found.id; });
        need--;
      }
    }
    while (plans[editor].length < rules.cap && pool.length > 0) {
      var pick = pool.shift();
      plans[editor].push(pick);
      used[pick.id] = true;
    }

    if (plans[editor].length === 0) {
      alerts.push(editor + ' has no videos matching their skill level \u2014 reassign manually');
    }
  });

  // Overflow: Zidni absorbs videos assigned to editors who can't handle them
  if (plans.Zidni.length < EDITOR_RULES.Zidni.cap) {
    var slotsLeft = EDITOR_RULES.Zidni.cap - plans.Zidni.length;
    STATE.assets.forEach(function(a) {
      if (slotsLeft <= 0 || used[a.id] || a.released || a.scheduledFor || a.status === 'Approved') return;
      var allowed = EDITOR_ALLOWED_DIFF[a.editor] || [];
      if (allowed.indexOf(a.difficulty) < 0) {
        plans.Zidni.push(a);
        used[a.id] = true;
        overflow.push({ from: a.editor, to: 'Zidni', asset: a });
        slotsLeft--;
      }
    });
    plans.Zidni = sortByPriority(plans.Zidni, EDITOR_RULES.Zidni.countryOrder);
  }

  return { plans: plans, alerts: alerts, overflow: overflow };
}

function runScheduler() {
  var dateStr = STATE.schedulerDate;
  if (isWeekend(dateStr) && !STATE.schedulerIncludeWeekends) {
    toast('Weekend skipped. Enable override if you want to drop today.', 'error');
    return;
  }
  var result = computeDayPlan();
  var totalScheduled = 0;

  Object.keys(result.plans).forEach(function(editor) {
    var list = result.plans[editor];
    list.forEach(function(a) { a.scheduledFor = dateStr; totalScheduled++; });
    if (list.length) {
      logAction('scheduled', editor + ': ' + list.length + ' video(s) scheduled for ' + dateStr);
    }
  });
  result.overflow.forEach(function(o) { logAction('updated', 'Overflow: ' + o.asset.name + ' \u2192 Zidni (from ' + o.from + ')'); });
  result.alerts.forEach(function(msg) { logAction('updated', 'ALERT: ' + msg); });

  toast(totalScheduled ? 'Scheduled ' + totalScheduled + ' videos for ' + dateStr : 'No videos scheduled (queues empty?)', totalScheduled ? 'success' : 'error');
  render();
}

function clearSchedule() {
  var dateStr = STATE.schedulerDate, cleared = 0;
  STATE.assets.forEach(function(a) {
    if (a.scheduledFor === dateStr && !a.released) { a.scheduledFor = ''; cleared++; }
  });
  if (cleared) logAction('updated', 'Cleared ' + cleared + ' scheduled videos for ' + dateStr);
  toast(cleared ? 'Cleared ' + cleared + ' scheduled videos' : 'Nothing to clear', cleared ? 'success' : '');
  render();
}

function releaseScheduled() {
  var dateStr = STATE.schedulerDate;
  var byEditor = {};
  STATE.assets.forEach(function(a) {
    if (a.scheduledFor === dateStr && !a.released) {
      a.released = true;
      byEditor[a.editor] = (byEditor[a.editor] || []);
      byEditor[a.editor].push(a);
    }
  });

  var total = 0;
  Object.keys(byEditor).forEach(function(editor) {
    var list = byEditor[editor];
    total += list.length;
    // Daily drop is a direct send (not batched) because it's already a batch
    var lines = [':clapper: *Daily queue for ' + editor + '* (' + dateStr + ')'];
    list.forEach(function(a, i) { lines.push('  ' + (i+1) + '. ' + a.name + '  _(' + a.difficulty + ')_'); });
    STATE.sentNotifications.unshift({
      time: timeStamp(), editor: editor,
      items: list.map(function(a) { return { name: a.name, change: 'daily-queue' }; }),
      reason: 'daily-drop', body: lines.join('\n')
    });
    logAction('notified', editor + ' \u2014 daily queue sent (' + list.length + ' videos)');
  });
  if (STATE.sentNotifications.length > 20) STATE.sentNotifications = STATE.sentNotifications.slice(0, 20);

  toast(total ? 'Released ' + total + ' videos + sent daily queue pings' : 'Nothing to release', total ? 'success' : '');
  render();
}

  if (!oldEditor && newEditor && chosenStatus === 'Draft') return 'Assigned';
  if (oldEditor && !newEditor) return 'Draft';
  return chosenStatus;
}

function renderNotificationsView() {
  // Any webhook configured at all? (for the top-level warning banner only)
  var cw = STATE.countryWebhooks || {};
  var anyWebhookReady = webhookValid(STATE.webhookUrl)
    || Object.keys(cw).some(function(k) { return webhookValid(cw[k]); });
  var isFileProtocol = location.protocol === 'file:';
  var fileBanner = isFileProtocol
    ? '<div class="alert-box" style="margin-bottom:12px;">\u26A0 You\'re running this file via <code style="font-family:monospace; background:var(--bg4); padding:1px 5px; border-radius:3px;">file://</code>. Safari and Firefox block webhook requests from this origin. Slack sends may fail or fall back to blind mode (no delivery confirmation). For reliable sends, host the file on a local server \u2014 e.g. <code style="font-family:monospace; background:var(--bg4); padding:1px 5px; border-radius:3px;">python3 -m http.server</code> then open <code style="font-family:monospace; background:var(--bg4); padding:1px 5px; border-radius:3px;">http://localhost:8000/campaign-manager.html</code>.</div>'
    : '';

  // Batch card renderer, used for both editor and PM-country batches.
  function renderBatchCard(recipient) {
    var isPm = recipient.indexOf('PM:') === 0;
    var countryCode = isPm ? recipient.slice(3) : null;
    var displayName = isPm ? (countryCode + ' \u2014 PM review queue') : recipient;
    var avatarHtml = isPm
      ? '<div class="country-flag flag-' + countryCode + '" style="width:28px; height:20px; font-size:10px;">' + countryCode + '</div>'
      : '<div class="editor-avatar av-' + recipient + '">' + editorInitials(recipient) + '</div>';

    var batch = STATE.pendingBatches[recipient] || { items: [], firstQueuedAt: null };
    var count = batch.items.length;
    var timeRemaining = '';
    var progressPct = 0;
    var cardClass = 'empty';
    var progressClass = '';

    if (count > 0) {
      if (count >= BATCH_SIZE_LIMIT) { cardClass = 'ready'; progressClass = 'ready'; progressPct = 100; }
      else if (batch.firstQueuedAt) {
        var elapsed = Date.now() - batch.firstQueuedAt;
        var remaining = Math.max(0, BATCH_TIME_LIMIT_MS - elapsed);
        var pctTime = Math.min(100, (elapsed / BATCH_TIME_LIMIT_MS) * 100);
        var pctSize = (count / BATCH_SIZE_LIMIT) * 100;
        progressPct = Math.max(pctTime, pctSize);
        var mins = Math.floor(remaining / 60000);
        var secs = Math.floor((remaining % 60000) / 1000);
        timeRemaining = 'fires in ~' + mins + 'm ' + String(secs).padStart(2,'0') + 's';
        cardClass = remaining < 5 * 60 * 1000 ? 'warn' : '';
        progressClass = remaining < 5 * 60 * 1000 ? 'warn' : '';
      }
    }

    var itemsHtml = count === 0
      ? '<div style="padding:20px; text-align:center; color:var(--text3); font-size:12px; background:var(--bg3); border-radius:6px; border:1px dashed var(--border2);">No pending notifications</div>'
      : batch.items.map(function(it, i) {
          var changeLabel = ({ 'assigned': 'new assignment', 'for-review': 'ready for review', 'needs-revisions': 'needs revisions', 'created': 'new task', 'reassigned': 'reassigned', 'status': 'status change' })[it.change] || it.change;
          var detailHtml = it.detail
            ? '<div style="grid-column:1/-1; font-size:10.5px; color:var(--text3); font-family:\'JetBrains Mono\', monospace; padding:2px 0 0 22px; word-break:break-all;">' + escapeHtml(it.detail) + '</div>'
            : '';
          return '<div class="batch-item" style="display:grid; grid-template-columns:auto 1fr auto; align-items:center; column-gap:8px; row-gap:0;">' +
            '<span class="batch-item-idx">' + (i+1) + '.</span>' +
            '<span class="batch-item-name">' + escapeHtml(it.name) + '</span>' +
            '<span class="batch-item-change change-' + it.change + '">' + changeLabel + '</span>' +
            detailHtml +
          '</div>';
        }).join('');

    var statusLabel = count >= BATCH_SIZE_LIMIT ? 'ready to fire'
      : count === 0 ? 'empty'
      : timeRemaining || (count + '/' + BATCH_SIZE_LIMIT + ' queued');

    // Per-card webhook readiness. For mixed-country editor batches, "ready" means
    // we auto-split AND at least one country group resolves to a valid webhook.
    // For everything else (PM batches, single-country editor, user overrode split),
    // we resolve once against the whole window and check validity.
    var previewItems = batch.items.slice(0, BATCH_SIZE_LIMIT);

    // Figure out country shape of this batch
    var batchCountries = {};
    previewItems.forEach(function(it) { if (it.country) batchCountries[it.country] = true; });
    var batchCountryList = Object.keys(batchCountries);
    var isMixedEditorBatch = !isPm && batchCountryList.length > 1;
    var userWantsNoSplit = !!STATE.noSplit[recipient];
    var willSplit = isMixedEditorBatch && !userWantsNoSplit;

    var resolvedUrl, cardWebhookReady, splitGroupsStatus = null;
    if (willSplit) {
      // Per-group resolution. Ready if any group resolves.
      splitGroupsStatus = groupItemsByCountry(previewItems).map(function(g) {
        var u = resolveWebhookForEditor(recipient, g.items);
        return { country: g.country, count: g.items.length, ok: webhookValid(u) };
      });
      cardWebhookReady = splitGroupsStatus.some(function(s) { return s.ok; });
      resolvedUrl = null; // not meaningful in split mode
    } else {
      resolvedUrl = resolveWebhookForEditor(recipient, previewItems);
      cardWebhookReady = webhookValid(resolvedUrl);
    }

    var soloCountry = batchCountryList.length === 1 ? batchCountryList[0] : null;
    var cwMap = STATE.countryWebhooks || {};
    var usingFallback = !willSplit && cardWebhookReady && !(isPm
      ? webhookValid(cwMap[countryCode])
      : (soloCountry && webhookValid(cwMap[soloCountry])));

    var sendTitle;
    if (willSplit) {
      // Summarize per-group readiness
      var okGroups = splitGroupsStatus.filter(function(s) { return s.ok; });
      var badGroups = splitGroupsStatus.filter(function(s) { return !s.ok; });
      if (badGroups.length === 0) {
        sendTitle = 'Auto-split: POST ' + splitGroupsStatus.length + ' messages, one per country (' +
          splitGroupsStatus.map(function(s) { return s.country + '\u00D7' + s.count; }).join(', ') + ')';
      } else if (okGroups.length === 0) {
        sendTitle = 'Auto-split: no country webhooks set (' + badGroups.map(function(s) { return s.country; }).join(', ') + '), and no global fallback \u2014 set one in Automations';
      } else {
        sendTitle = 'Auto-split: ' + okGroups.length + ' group(s) will send (' + okGroups.map(function(s) { return s.country; }).join(', ') +
          '); ' + badGroups.length + ' will be skipped (' + badGroups.map(function(s) { return s.country; }).join(', ') + ') \u2014 set their webhooks';
      }
    } else if (cardWebhookReady) {
      if (isPm) {
        sendTitle = usingFallback
          ? 'POST to Slack via global fallback (no ' + countryCode + ' webhook set)'
          : 'POST to the ' + countryCode + ' country webhook';
      } else if (isMixedEditorBatch) {
        // Mixed + user forced no-split
        sendTitle = 'Mixed-country batch (' + batchCountryList.join(', ') + '), split disabled \u2014 will POST as one message via global fallback';
      } else if (soloCountry) {
        sendTitle = usingFallback
          ? 'POST via global fallback (no ' + soloCountry + ' webhook set)'
          : 'POST to the ' + soloCountry + ' country webhook';
      } else {
        sendTitle = 'POST to Slack via webhook';
      }
    } else {
      if (isPm) {
        sendTitle = 'No webhook for ' + countryCode + ' and no global fallback \u2014 set one in Automations';
      } else if (isMixedEditorBatch) {
        sendTitle = 'Mixed-country batch, split disabled, and no global fallback \u2014 set one in Automations';
      } else if (soloCountry) {
        sendTitle = 'No webhook for ' + soloCountry + ' and no global fallback \u2014 set one in Automations';
      } else {
        sendTitle = 'No webhook configured \u2014 set one in Automations';
      }
    }

    var sendBtnAttrs = cardWebhookReady
      ? 'class="batch-flush-btn" title="' + escapeHtml(sendTitle) + '"'
      : 'class="batch-flush-btn" title="' + escapeHtml(sendTitle) + '" disabled style="opacity:0.45; cursor:not-allowed;"';

    // Split toggle: only shown for editor cards whose pending batch window spans >1 country.
    // Checkbox is checked when split IS active (i.e. !noSplit). Reason for that orientation:
    // splitting is the default/recommended behavior, so "checked = default" reads cleanly.
    var splitToggle = '';
    if (isMixedEditorBatch) {
      var cntrySummary = batchCountryList.join(' + ');
      var toggleLabel = willSplit
        ? 'Auto-splitting by country (' + cntrySummary + ')'
        : 'Split disabled \u2014 will send as one message';
      splitToggle =
        '<label class="batch-split-toggle" title="When on, sends one Slack message per country using that country\u2019s webhook. When off, sends the whole batch as one message via the global fallback.">' +
          '<input type="checkbox" onchange="App.toggleSplit(\'' + recipient + '\', this.checked)"' + (willSplit ? ' checked' : '') + '>' +
          '<span>' + escapeHtml(toggleLabel) + '</span>' +
        '</label>';
    }

    // PM batches have no per-editor Slack channel, so hide the Open Slack button for them
    var openSlackBtn = isPm ? '' : '<button class="batch-slack-btn" title="Open Slack channel" onclick="App.openSlack(\'' + recipient + '\')">\u{1F517}</button>';

    var actions = count > 0
      ? '<div class="batch-actions">' +
          '<button ' + sendBtnAttrs + ' onclick="App.sendBatch(\'' + recipient + '\')">\u{1F680} Send</button>' +
          '<button class="batch-copy-btn" title="Copy Slack-formatted message" onclick="App.copyMessage(' + JSON.stringify(buildBatchMessage(recipient, batch.items.slice(0, BATCH_SIZE_LIMIT))).replace(/"/g, '&quot;') + ', \'Copied \u2014 paste into Slack\')">\u{1F4CB}</button>' +
          openSlackBtn +
          '<button class="batch-copy-btn" title="Mark sent in-app without POSTing to Slack (dry-run)" onclick="App.flushBatch(\'' + recipient + '\')">\u{1F4E8}</button>' +
          '<button class="batch-clear-btn" onclick="App.clearBatchCmd(\'' + recipient + '\')">Clear</button>' +
        '</div>' + splitToggle
      : '';

    return '<div class="batch-card ' + cardClass + '">' +
      '<div class="batch-card-header">' +
        avatarHtml +
        '<div class="batch-card-title">' + displayName + '</div>' +
        '<div class="batch-header-right">' + statusLabel + '</div>' +
      '</div>' +
      '<div class="batch-progress-bar"><div class="batch-progress-fill ' + progressClass + '" style="width:' + progressPct + '%;"></div></div>' +
      '<div class="batch-items">' + itemsHtml + '</div>' +
      actions +
    '</div>';
  }

  var editorCards = EDITORS.map(renderBatchCard).join('');
  var pmCards = STATE.countries.map(function(c) { return renderBatchCard('PM:' + c.code); }).join('');

  // Sent notifications log
