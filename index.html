<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tilt // Video Campaign Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0b0e; --bg2: #131318; --bg3: #1a1a22; --bg4: #25252f;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text1: #f0eefc; --text2: #a09db8; --text3: #6b6880;
    --accent: #7f77dd; --accent2: #afa9ec; --accent-dim: rgba(127,119,221,0.12);
    --green: #1d9e75; --green-bg: #04342c; --green-text: #5dcaa5;
    --amber-bg: #412402; --amber-text: #fac775;
    --red: #e24b4a; --red-bg: #501313; --red-text: #f09595;
    --blue-bg: #042c53; --blue-text: #85b7eb;
    --gray-bg: #2c2c2a; --gray-text: #b4b2a9;
    --pink-bg: #4b1528; --pink-text: #f4c0d1;
  }
  body { font-family: 'Inter Tight', system-ui, sans-serif; background: var(--bg); color: var(--text1); height: 100vh; overflow: hidden; font-size: 14px; -webkit-font-smoothing: antialiased; }
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar { display: flex; align-items: center; gap: 20px; padding: 10px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-size: 14px; font-weight: 700; color: var(--text1); letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 2px; box-shadow: 0 0 8px rgba(127,119,221,0.6); }
  .logo span { color: var(--text3); font-weight: 400; }
  .topbar-tabs { display: flex; gap: 2px; margin-left: 16px; }
  .tab-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; background: transparent; color: var(--text2); transition: all 0.12s; position: relative; }
  .tab-btn:hover { background: var(--bg3); color: var(--text1); }
  .tab-btn.active { background: var(--bg3); color: var(--accent2); }
  .tab-badge { display: inline-block; padding: 1px 5px; border-radius: 8px; font-size: 9.5px; font-weight: 700; background: var(--accent); color: #fff; margin-left: 4px; font-family: 'JetBrains Mono', monospace; min-width: 14px; text-align: center; }
  .tab-badge.alert { background: var(--amber-text); color: var(--amber-bg); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-text); box-shadow: 0 0 6px var(--green-text); }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.15s ease; }
  .sidebar-header { padding: 14px 14px 8px; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .sidebar-title { font-size: 10.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .sidebar-toggle { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--text3); cursor: pointer; font-size: 12px; padding: 2px 7px; font-family: 'JetBrains Mono', monospace; transition: all 0.12s; line-height: 1; }
  .sidebar-toggle:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }

  /* Compact sidebar: narrower column, trimmed content. Country name hidden, sub-campaign
     name hidden, drag handle hidden. Tooltips provide discoverability. */
  .sidebar.sidebar-compact { width: 110px; }
  .sidebar.sidebar-compact .sidebar-header { padding: 14px 8px 8px; justify-content: center; }
  .sidebar.sidebar-compact .country-row { gap: 5px; padding: 8px 6px; justify-content: flex-start; }
  .sidebar.sidebar-compact .country-row .country-flag { width: 22px; height: 15px; font-size: 9px; }
  .sidebar.sidebar-compact .country-count { margin-left: auto; }
  .sidebar.sidebar-compact .subcamp-item.subcamp-compact { padding: 5px 6px 5px 14px; gap: 6px; justify-content: flex-start; }
  .sidebar.sidebar-compact .subcamp-item.subcamp-compact::before { left: 6px; }
  .sidebar.sidebar-compact .subcamp-item.subcamp-compact .rank-badge { width: 20px; height: 20px; font-size: 10.5px; }

  .country-group { margin-bottom: 4px; }
  .country-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; transition: background 0.1s; border-radius: 6px; margin: 0 8px 2px; }
  .country-row:hover { background: var(--bg3); }
  .country-chevron { color: var(--text3); font-size: 10px; flex-shrink: 0; transition: transform 0.15s; width: 10px; font-family: 'JetBrains Mono', monospace; }
  .country-flag { width: 26px; height: 18px; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }
  .flag-UK { background: linear-gradient(135deg, #012169 50%, #c8102e 50%); color: #fff; }
  .flag-ES { background: linear-gradient(180deg, #aa151b 33%, #f1bf00 33%, #f1bf00 66%, #aa151b 66%); color: #000; }
  .flag-IT { background: linear-gradient(90deg, #008c45 33%, #f4f5f0 33%, #f4f5f0 66%, #cd212a 66%); color: #000; }
  .flag-US { background: linear-gradient(180deg, #b22234 0 20%, #fff 20% 40%, #b22234 40% 60%, #fff 60% 80%, #b22234 80% 100%); color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 0 3px rgba(60,59,110,0.8); position: relative; overflow: hidden; }
  .flag-US::before { content: ''; position: absolute; top: 0; left: 0; width: 45%; height: 55%; background: #3c3b6e; z-index: 0; }
  .flag-PL { background: linear-gradient(180deg, #fff 50%, #dc143c 50%); color: #dc143c; }
  /* PM review queue badge \u2014 looks like a flag but in accent purple, for PM batch cards */
  .flag-PM { background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); color: #fff; letter-spacing: 0.06em; }
  /* Compound avatar for PM batch cards: big PM badge with a smaller country-code chip on top-right */
  .pm-avatar { position: relative; display: inline-flex; flex-shrink: 0; }
  .pm-avatar .flag-PM { flex-shrink: 0; }
  .pm-avatar > .country-flag:last-child { position: absolute; top: -4px; right: -6px; border: 1px solid var(--bg2); box-shadow: 0 1px 2px rgba(0,0,0,0.4); }
  .country-name { font-size: 13px; font-weight: 600; color: var(--text1); flex: 1; min-width: 0; white-space: nowrap; }
  .country-count { font-size: 10.5px; color: var(--text3); font-family: 'JetBrains Mono', monospace; padding: 1px 6px; background: var(--bg4); border-radius: 3px; flex-shrink: 0; }

  .subcamp-list { display: none; padding: 2px 0 4px; }
  .subcamp-list.open { display: block; }
  .subcamp-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px 6px 28px; cursor: pointer; transition: background 0.1s; margin: 0 8px 2px; border-radius: 6px; border: 1px solid transparent; position: relative; }
  .subcamp-item::before { content: ''; position: absolute; left: 16px; top: 0; bottom: 0; width: 1px; background: var(--border); }
  .subcamp-item:hover { background: var(--bg3); }
  .subcamp-item.active { background: var(--bg3); border-color: var(--border2); box-shadow: inset 3px 0 0 var(--accent); }
  .subcamp-item.dragging { opacity: 0.4; background: var(--bg4); }
  .subcamp-item.drag-over-top { box-shadow: inset 0 2px 0 var(--accent); }
  .subcamp-item.drag-over-bottom { box-shadow: inset 0 -2px 0 var(--accent); }
  .subcamp-item.drag-blocked { cursor: not-allowed; opacity: 0.9; }
  .drag-handle { flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text3); cursor: grab; padding: 2px 2px; user-select: none; line-height: 0.7; }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle:hover { color: var(--text1); }
  .rank-badge { width: 20px; height: 20px; border-radius: 4px; background: var(--bg4); color: var(--text2); font-size: 10.5px; font-weight: 600; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .subcamp-item.active .rank-badge { background: var(--accent); color: #fff; }
  .subcamp-name { font-size: 12.5px; font-weight: 500; color: var(--text1); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-pill { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; letter-spacing: 0.04em; text-transform: uppercase; }
  .cat-manage-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .cat-manage-row:last-child { border-bottom: none; }
  .cat-swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; border: 1px solid var(--border2); }
  .cat-name-input { flex: 1; font-size: 13px; }
  .cat-usage { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; min-width: 70px; text-align: right; }
  .add-sub-btn { margin: 4px 16px 6px 44px; padding: 5px 8px; border-radius: 5px; border: 1px dashed var(--border2); background: transparent; color: var(--text3); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; width: calc(100% - 60px); transition: all 0.12s; }
  .add-sub-btn:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
  .sidebar-scroll { flex: 1; overflow-y: auto; padding: 2px 0 8px; }
  .reorder-btn { margin: 0 12px 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; justify-content: center; transition: all 0.12s; }
  .reorder-btn:hover { background: var(--accent-dim); color: var(--accent2); border-color: var(--accent); }

  .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .camp-header { padding: 16px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .breadcrumb-flag-inline { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 14px; border-radius: 2px; font-size: 9px; font-weight: 700; }
  .breadcrumb-sep { color: var(--text3); }
  .breadcrumb-country { color: var(--text2); }
  .camp-title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .camp-title { font-size: 18px; font-weight: 700; color: var(--text1); letter-spacing: -0.3px; }
  .camp-brief { font-size: 13px; color: var(--text2); line-height: 1.5; max-width: 640px; }
  .camp-meta { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  .meta-chip { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border2); color: var(--text2); font-family: 'JetBrains Mono', monospace; display: inline-flex; align-items: center; gap: 5px; }
  .meta-chip-label { color: var(--text3); }
  /* Link pills for Drive/Brief \u2014 same chrome as .meta-chip, but tinted blue and clickable. */
  a.meta-chip.link-pill { text-decoration: none; color: var(--blue-text); background: rgba(59,130,197,0.06); border-color: rgba(59,130,197,0.22); transition: border-color 0.12s, background 0.12s, transform 0.12s; }
  a.meta-chip.link-pill:hover { border-color: var(--accent); background: rgba(59,130,197,0.14); color: var(--accent2); }
  a.meta-chip.link-pill:active { transform: translateY(1px); }
  .link-pill-host { font-weight: 600; }
  .link-pill-arrow { opacity: 0.7; font-size: 10px; }
  a.meta-chip.link-pill:hover .link-pill-arrow { opacity: 1; }
  .meta-chip.link-pill-invalid { color: var(--amber-text); border-color: rgba(250,199,117,0.3); background: rgba(250,199,117,0.05); font-style: italic; }
  .edit-btn { padding: 5px 11px; border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.12s; }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .edit-btn.ml-auto { margin-left: auto; }
  .del-camp-btn:hover { border-color: var(--red); color: var(--red-text); }

  .toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  .search-wrap { position: relative; width: 220px; }
  .search-wrap input { width: 100%; padding: 7px 10px 7px 28px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text1); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.12s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; }
  .filter-select { padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-family: inherit; font-size: 13px; cursor: pointer; outline: none; }
  .filter-select:focus { border-color: var(--accent); }
  .count-chip { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; padding: 3px 8px; background: var(--bg3); border-radius: 4px; }
  .primary-btn { margin-left: auto; padding: 7px 14px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.12s; }
  .primary-btn:hover { opacity: 0.88; }

  .table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { position: sticky; top: 0; z-index: 2; background: var(--bg2); }
  th { padding: 9px 12px; text-align: left; font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border2); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:hover td { background: rgba(127,119,221,0.03); }
  .pn { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text3); }
  .video-name-cell { max-width: 260px; display: flex; align-items: center; gap: 6px; }
  .video-name-cell > .editable-cell:first-child { flex: 1; min-width: 0; overflow: hidden; }
  .video-name-cell > .editable-cell:last-child { flex-shrink: 0; }
  .video-name-text { font-size: 13px; color: var(--text1); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'JetBrains Mono', monospace; }
  .version-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 600; font-family: 'JetBrains Mono', monospace; background: var(--accent-dim); color: var(--accent2); flex-shrink: 0; }
  .cat-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 2px 7px; border-radius: 3px; background: var(--amber-bg); color: var(--amber-text); }
  .link-cell a { font-size: 12px; color: var(--blue-text); text-decoration: none; font-family: 'JetBrains Mono', monospace; display: inline-flex; align-items: center; gap: 3px; }
  .link-cell a:hover { color: var(--accent2); }
  .link-cell-inline { display: inline-flex; align-items: center; gap: 6px; }
  .url-edit-pencil { background: transparent; border: 1px solid transparent; border-radius: 3px; color: var(--text3); cursor: pointer; font-size: 11px; padding: 1px 4px; font-family: inherit; transition: all 0.12s; line-height: 1; }
  .url-edit-pencil:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
  .no-link { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .editor-cell { display: flex; align-items: center; gap: 7px; }
  .editor-avatar { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .av-Zidni { background: #3c3489; color: var(--accent2); }
  .av-Patty { background: #085041; color: var(--green-text); }
  .av-Sharm { background: #633806; color: var(--amber-text); }
  .av-Elsa { background: #72243e; color: var(--pink-text); }
  .editor-name { font-size: 12px; color: var(--text1); }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .s-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .st-Approved { background: var(--green-bg); color: var(--green-text); }
  .st-For_Review { background: var(--blue-bg); color: var(--blue-text); }
  .st-Assigned { background: #3c3489; color: #d8d4ff; }
  .st-Draft { background: var(--gray-bg); color: var(--gray-text); }
  .st-Needs_Revisions { background: var(--red-bg); color: var(--red-text); }
  /* Inline status dropdown styled to match the badge colors */
  .status-select { appearance: none; -webkit-appearance: none; padding: 3px 22px 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: inherit; border: 1px solid transparent; cursor: pointer; outline: none; background-repeat: no-repeat; background-position: right 6px center; background-size: 8px; transition: filter 0.12s, box-shadow 0.12s; }
  .status-select:hover { filter: brightness(1.15); }
  .status-select:focus { box-shadow: 0 0 0 2px var(--accent-dim); }
  .status-select option { background: var(--bg3); color: var(--text1); }
  .status-select.st-Draft        { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%23b4b2a9'/></svg>"); }
  .status-select.st-Assigned     { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%23d8d4ff'/></svg>"); }
  .status-select.st-For_Review   { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%2385b7eb'/></svg>"); }
  .status-select.st-Needs_Revisions { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%23f09595'/></svg>"); }
  .status-select.st-Approved     { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%235dcaa5'/></svg>"); }
  .date-cell { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .eta-cell { font-size: 12px; color: var(--amber-text); font-family: 'JetBrains Mono', monospace; white-space: nowrap; font-weight: 500; }
  .sched-cell { font-size: 12px; color: var(--blue-text); font-family: 'JetBrains Mono', monospace; white-space: nowrap; font-weight: 500; }
  .released-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; background: var(--green-bg); color: var(--green-text); }
  .diff-badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10.5px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }
  .diff-Low { background: #04342c; color: #5dcaa5; }
  .diff-Moderate { background: #042c53; color: #85b7eb; }
  .diff-High { background: #412402; color: #fac775; }
  .diff-Max { background: #501313; color: #f09595; }
  /* Inline click-to-edit cells in the assets table. Subtle hover cue so users discover it
     without it being visually loud. Edit-mode input uses accent-colored border + focus ring. */
  .editable-cell { cursor: text; padding: 3px 6px; margin: -3px -6px; border-radius: 4px; border: 1px solid transparent; transition: background 0.1s, border-color 0.1s; min-height: 24px; display: block; }
  .editable-cell:hover { background: var(--bg3); border-color: var(--border); }
  .inline-edit-input { width: 100%; padding: 4px 7px; border-radius: 4px; border: 1px solid var(--accent); background: var(--bg3); color: var(--text1); font-family: 'JetBrains Mono', monospace; font-size: 12px; outline: none; box-sizing: border-box; }
  .inline-edit-input:focus { border-color: var(--accent2); box-shadow: 0 0 0 2px var(--accent-dim); }
  .inline-edit-input[type="date"] { min-width: 130px; }
  select.inline-edit-input { cursor: pointer; }
  .row-actions { display: flex; gap: 4px; }
  .action-btn { padding: 4px 9px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.12s; }
  .action-btn:hover { border-color: var(--border2); color: var(--text1); background: var(--bg3); }
  .del-btn:hover { border-color: var(--red); color: var(--red-text); background: var(--red-bg); }

  .scheduler-panel, .automation-panel, .config-panel, .notif-panel { padding: 24px 28px; overflow-y: auto; flex: 1; max-width: 1040px; width: 100%; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; margin-top: 8px; display: flex; align-items: center; gap: 8px; }
  .section-title:first-child { margin-top: 0; }

function todayISO() { return new Date().toISOString().slice(0, 10); }

// ===================== DATE HELPERS =====================
// Asset dates (estDelivery, dateApproved) go through this trio. Internally we store
// the ISO string 'YYYY-MM-DD' (which <input type="date"> reads/writes natively).
// Display uses '25 Apr 2026'. Old data used 'Apr 25, 2026' \u2014 parseDate handles both so
// loadState's migration can normalize everything. MONTH_SHORT is declared earlier
// (above STATE) so the seed-data path can call these helpers during boot.

// Return a Date object (at noon UTC to dodge timezone-edge issues) from a string.
// Accepts: ISO 'YYYY-MM-DD', 'Apr 25, 2026', '25 Apr 2026', or an already-parseable date.
// Returns null for empty/unparseable input.
function parseDate(str) {
  if (!str) return null;
  if (str instanceof Date) return isNaN(str) ? null : str;
  var s = String(str).trim();
  if (!s) return null;
  // ISO 'YYYY-MM-DD' \u2014 cheap path
  var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) {
    var d = new Date(Date.UTC(+iso[1], +iso[2] - 1, +iso[3], 12, 0, 0));
    return isNaN(d) ? null : d;
  }
  // 'Apr 25, 2026' or '25 Apr 2026' \u2014 match month name on either side of the day
  var monName = '(' + MONTH_SHORT.join('|') + ')';
  var m1 = s.match(new RegExp('^' + monName + '\\s+(\\d{1,2}),?\\s+(\\d{4})$', 'i'));
  var m2 = s.match(new RegExp('^(\\d{1,2})\\s+' + monName + ',?\\s+(\\d{4})$', 'i'));
  var year, monthIdx, day;
  if (m1) {
    monthIdx = MONTH_SHORT.findIndex(function(mn) { return mn.toLowerCase() === m1[1].toLowerCase(); });
    day = +m1[2]; year = +m1[3];
  } else if (m2) {
    day = +m2[1];
    monthIdx = MONTH_SHORT.findIndex(function(mn) { return mn.toLowerCase() === m2[2].toLowerCase(); });
    year = +m2[3];
  } else {
    // Last-ditch fallback: let the browser try. Acceptable since this only runs on migration.
    var fallback = new Date(s);
    return isNaN(fallback) ? null : fallback;
  }
  if (monthIdx < 0) return null;
  var dd = new Date(Date.UTC(year, monthIdx, day, 12, 0, 0));
  return isNaN(dd) ? null : dd;
}

// Format a date value for display: '25 Apr 2026'. Accepts Date, ISO, or legacy strings.
// Returns '' for empty/unparseable input.
function formatDate(value) {
  var d = (value instanceof Date) ? value : parseDate(value);
  if (!d) return '';
  return d.getUTCDate() + ' ' + MONTH_SHORT[d.getUTCMonth()] + ' ' + d.getUTCFullYear();
}

// Convert a date value (Date / ISO / legacy string) to an ISO 'YYYY-MM-DD' string
// suitable for <input type="date">. Returns '' if unparseable.
function toISODate(value) {
  var d = (value instanceof Date) ? value : parseDate(value);
  if (!d) return '';
  var y = d.getUTCFullYear();
  var m = String(d.getUTCMonth() + 1).padStart(2, '0');
  var dd = String(d.getUTCDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

// Returns a normalized URL if `str` (after trimming) looks like a single URL, or null
// otherwise. Accepts full http(s) URLs and scheme-less URLs like 'frame.io/...' or
// 'www.frame.io/...' (auto-prepends 'https://'). Used for the "open" button state,
// the link pills in the sub-campaign header, and the Slack notification builder.
function extractSingleUrl(str) {
  if (!str) return null;
  var s = String(str).trim();
  if (!s) return null;
  // Reject if there's any whitespace inside \u2014 a single URL can't contain spaces or newlines
  if (/\s/.test(s)) return null;
  // Already has a scheme? Accept http(s), reject anything else (ftp://, file://, etc.)
  if (/^[a-z][a-z0-9+.-]*:/i.test(s)) {
    return /^https?:\/\/[^\s]+$/i.test(s) ? s : null;
  }
  // No scheme. Must still look like a domain: contain a dot, no illegal URL characters.
  // Simple sniff: start with alphanumeric, contain at least one dot, and be at least
  // 'a.b' long. This catches 'frame.io/x', 'www.frame.io', 'drive.google.com/folders/abc'
  // while still rejecting plain words like 'index' or 'foo'.
  if (/^[a-z0-9][a-z0-9.-]*\.[a-z]{2,}(?:\/[^\s]*)?$/i.test(s)) {
    return 'https://' + s;
  }
  return null;
}

// Returns just the hostname of a URL for display purposes, e.g.
// 'https://drive.google.com/drive/folders/abc' -> 'drive.google.com'. If the URL is
// malformed (shouldn't happen for strings that passed extractSingleUrl), returns the
// original string unchanged.
function hostnameFromUrl(url) {
  if (!url) return '';
  try {
    var u = new URL(url);
    return u.hostname;
  } catch (e) {
    return String(url);
  }
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

function statusClass(s) { return 'st-' + s.replace(/ /g, '_'); }

// Input-kind dispatch for renderEditableCell. Each entry says how the field reads from the

// Render a <td>'s inner content for an editable field. When not in edit mode, wraps the
// read-only display in a clickable overlay. When in edit mode, renders the matching input.
// The whole cell commits on Enter/blur (per user spec), cancels on Escape.
function renderEditableCell(asset, field) {
  var def = EDITABLE_FIELDS[field];
  if (!def) return '';
  var editing = EditState.assetId === asset.id && EditState.field === field;

  // URL fields are a special read-only shape: a link (click opens URL) plus a \u270e pencil
  // (click starts edit). Not a single clickable area like other kinds, so we branch early.
  if (def.kind === 'url' && !editing) {
    var url = def.value(asset);
    var label = def.linkLabel;
    var link = url
      ? '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" title="' + escapeHtml(url) + '">' + label + ' \u2197</a>'
      : '<span class="no-link">\u2014</span>';
    return '<span class="link-cell-inline">' + link +
      ' <button type="button" class="url-edit-pencil" ' +
        'onclick="App.startEdit(' + asset.id + ', \'' + field + '\')" ' +
        'title="Edit ' + field + ' URL">\u270E</button>' +
    '</span>';
  }

  if (!editing) {
    return '<div class="editable-cell" onclick="App.startEdit(' + asset.id + ', \'' + field + '\')" title="Click to edit ' + field + '">' +
      def.display(asset) +
    '</div>';
  }
  // Edit mode \u2014 render the appropriate input and wire commit/cancel handlers.
  var currentValue = def.value(asset);
  var commonHandlers =
    // Enter saves, Escape cancels
    'onkeydown="if(event.key===\'Enter\'){event.preventDefault();this.blur();}else if(event.key===\'Escape\'){event.preventDefault();App.cancelEdit();}" ' +
    // Blur saves (mirroring Enter via this.blur() above keeps the code paths consistent)
    'onblur="App.commitEdit(\'' + field + '\', this.value)"';

  if (def.kind === 'select') {
    var opts = def.options().map(function(v) {
      var label = def.optionLabel ? def.optionLabel(v) : v;
      return '<option value="' + escapeHtml(v) + '"' + (v === currentValue ? ' selected' : '') + '>' + escapeHtml(label) + '</option>';
    }).join('');
    // `<select>` commits on change too, so user doesn't have to blur after picking.
    return '<select class="inline-edit-input" autofocus ' +
      'onchange="App.commitEdit(\'' + field + '\', this.value)" ' +
      'onkeydown="if(event.key===\'Escape\'){event.preventDefault();App.cancelEdit();}">' +
      opts + '</select>';
  }
  if (def.kind === 'date') {
    return '<input type="date" class="inline-edit-input" autofocus value="' + escapeHtml(currentValue) + '" ' +
      commonHandlers + '>';
  }
  if (def.kind === 'url') {
    // Dedicated url input type gives browser-provided autocomplete and light validation
    return '<input type="url" class="inline-edit-input" autofocus value="' + escapeHtml(currentValue) + '" ' +
      'placeholder="https://..." ' + commonHandlers + '>';
  }
  // default: text input
  return '<input type="text" class="inline-edit-input" autofocus value="' + escapeHtml(currentValue) + '" ' +
    commonHandlers + '>';
}

// Build an inline <select> that matches the status badge colors and calls App.setAssetStatus on change.

// ===================== CATEGORY HELPERS =====================
// Find a category by name (case-insensitive). Returns the object or null.
function findCategory(name) {
  if (!name) return null;
  var lower = String(name).toLowerCase();
  for (var i = 0; i < STATE.categories.length; i++) {
    if (STATE.categories[i].name.toLowerCase() === lower) return STATE.categories[i];
  }
  return null;
}

// Get the {bg, fg} color for a category by name. Returns a sensible neutral if the
// category isn't in STATE.categories (e.g. legacy data with a name that was since deleted).
function categoryColor(name) {
  var cat = findCategory(name);
  if (cat) return cat.color;
  return { bg: 'var(--bg4)', fg: 'var(--text2)' };
}

// Render the pill HTML for a given category name. Used everywhere the category displays.
function categoryBadgeHtml(name) {
  var c = categoryColor(name);
  return '<div class="cat-pill" style="background:' + c.bg + '; color:' + c.fg + ';">' + escapeHtml(name || '\u2014') + '</div>';
}

// Next palette entry not yet used by any category. If all are used, cycles back to palette[0].
function pickNextCategoryColor() {
  for (var i = 0; i < CATEGORY_PALETTE.length; i++) {
    var used = false;
    for (var j = 0; j < STATE.categories.length; j++) {
      if (STATE.categories[j].color && STATE.categories[j].color.bg === CATEGORY_PALETTE[i].bg) {
        used = true; break;
      }
    }
    if (!used) return CATEGORY_PALETTE[i];
  }
  // all used \u2014 cycle
  return CATEGORY_PALETTE[STATE.categories.length % CATEGORY_PALETTE.length];
}

// Add a category by name if it doesn't already exist. Returns the category object.
// Name is trimmed; empty names are rejected (returns null). Duplicate names (case-insensitive)
// return the existing category without creating a second entry.
function addCategory(name) {
  var trimmed = String(name || '').trim();
  if (!trimmed) return null;
  var existing = findCategory(trimmed);
  if (existing) return existing;
  var cat = { name: trimmed, color: pickNextCategoryColor() };
  STATE.categories.push(cat);
  logAction('created', 'Category "' + trimmed + '" added');
  return cat;
}

// Count how many campaigns use a given category name (for delete-safety checks).
function categoryUsageCount(name) {
  var lower = String(name).toLowerCase();
  var n = 0;
  for (var i = 0; i < STATE.campaigns.length; i++) {
    if ((STATE.campaigns[i].category || '').toLowerCase() === lower) n++;
  }
  return n;
}

function findCampaignById(id) {
  for (var i = 0; i < STATE.campaigns.length; i++) if (STATE.campaigns[i].id === id) return STATE.campaigns[i];
  return null;

function getFilteredAssets() {
  var camp = getActiveCampaign();
  if (!camp) return [];
  var list = STATE.assets.filter(function(a) { return a.campaignId === camp.id; });
  if (STATE.search) {
    var q = STATE.search.toLowerCase();
    list = list.filter(function(a) {
      return a.name.toLowerCase().indexOf(q) >= 0
          || a.editor.toLowerCase().indexOf(q) >= 0
          || a.version.toLowerCase().indexOf(q) >= 0
          || a.status.toLowerCase().indexOf(q) >= 0
          || (a.difficulty || '').toLowerCase().indexOf(q) >= 0;
    });
  }
  if (STATE.statusFilter !== 'all') list = list.filter(function(a) { return a.status === STATE.statusFilter; });
  if (STATE.editorFilter !== 'all') list = list.filter(function(a) { return a.editor === STATE.editorFilter; });
  return list.sort(function(a, b) { return a.pn - b.pn; });
}

// ===================== NOTIFICATION BATCHING =====================
// Queue a notification. `recipient` is a batch key (editor name like 'Zidni' or 'PM:UK').
// `detail` is the already-formatted detail string to show under the item (e.g. raw+brief or Frame.io link).
function queueNotification(recipient, changeType, asset, detail) {
  if (!STATE.pendingBatches[recipient]) {
    STATE.pendingBatches[recipient] = { items: [], firstQueuedAt: null };
  }
  var batch = STATE.pendingBatches[recipient];
  var camp = findCampaignById(asset.campaignId);
  batch.items.push({
    id: STATE.nextBatchItemId++,
    assetId: asset.id,
    name: asset.name,
    country: camp ? camp.country : null,
    status: asset.status,
    editor: asset.editor || '',
    // Snapshot the raw, brief, and final URLs too, so the batch message can show per-item
    // links even if the asset is edited between queue and send. Read from the asset at
    // queue time.
    rawVideo: asset.rawVideo || '',
    editingBrief: asset.editingBrief || '',
    finalVideo: asset.finalVideo || '',
    change: changeType,
    detail: detail || '',
    queuedAt: Date.now()
  });
  if (batch.firstQueuedAt === null) batch.firstQueuedAt = Date.now();

  logAction('queued', recipient + ': "' + asset.name + '" \u2014 ' + changeType + ' (batch ' + batch.items.length + '/' + BATCH_SIZE_LIMIT + ')');

  // Check if we should fire
  if (batch.items.length >= BATCH_SIZE_LIMIT) {
    fireBatch(recipient, 'size-limit');
  }
}

// Dispatcher: called from the asset modal on create/update. Looks at the change and queues the
// correct notifications based on the status rules (see project brief).
function emitAssetChangeNotifications(asset, ctx) {
  var oldEditor = ctx.oldEditor || '';
  var oldStatus = ctx.oldStatus;
  var newEditor = asset.editor || '';
  var newStatus = asset.status;
  var editorChanged = oldEditor !== newEditor;
  var statusChanged = oldStatus !== newStatus;

  // Rule: Assigned (editor newly assigned or reassigned) \u2014 ping editor with raw + brief
  // Fires when: new asset with editor, or editor changed (and someone is assigned), or status flipped to Assigned
  var justAssigned = (ctx.isNew && newEditor) || (editorChanged && newEditor) || (statusChanged && newStatus === 'Assigned' && newEditor);
  if (justAssigned) {
    var detailLines = [];
    if (asset.rawVideo)     detailLines.push('raw: ' + asset.rawVideo);
    if (asset.editingBrief) detailLines.push('brief: ' + asset.editingBrief);
    var assignedDetail = detailLines.length ? detailLines.join(' \u00B7 ') : '(no raw/brief links set)';
    queueNotification(newEditor, 'assigned', asset, assignedDetail);
  }

  // Rule: For Review \u2014 ping PM (country channel) with Frame.io link
  if (statusChanged && newStatus === 'For Review') {
    var camp = findCampaignById(asset.campaignId);
    var country = camp ? camp.country : null;
    if (country) {
      var reviewDetail = asset.finalVideo ? 'Frame.io: ' + asset.finalVideo : '(no Frame.io link set)';
      queueNotification('PM:' + country, 'for-review', asset, reviewDetail);
    }
  }

  // Rule: Needs Revisions \u2014 ping editor with Frame.io link (revision targets)
  if (statusChanged && newStatus === 'Needs Revisions' && newEditor) {
    var revDetail = asset.finalVideo ? 'Frame.io: ' + asset.finalVideo : '(no Frame.io link set)';
    queueNotification(newEditor, 'needs-revisions', asset, revDetail);
  }

  // Draft and Approved intentionally produce no notifications.
}

function fireBatch(recipient, reason) {
  var batch = STATE.pendingBatches[recipient];
  if (!batch || batch.items.length === 0) return false;
  var items = batch.items.slice(0, BATCH_SIZE_LIMIT);
  var remaining = batch.items.slice(BATCH_SIZE_LIMIT);

  var msg = buildBatchMessage(recipient, items);

  // Record as "sent"
  STATE.sentNotifications.unshift({
    time: timeStamp(),
    editor: recipient,
    items: items,
    reason: reason,
    body: msg
  });
  if (STATE.sentNotifications.length > 20) STATE.sentNotifications.pop();

  logAction('notified', recipient + ' \u2014 sent ' + items.length + ' update(s) to Slack (' + reason + ')');

  // Update batch state
  batch.items = remaining;
  batch.firstQueuedAt = remaining.length > 0 ? Date.now() : null;
  return true;
}

function clearBatch(recipient) {
  if (!STATE.pendingBatches[recipient]) return;
  var n = STATE.pendingBatches[recipient].items.length;
  STATE.pendingBatches[recipient] = { items: [], firstQueuedAt: null };
  logAction('deleted', recipient + ': cleared ' + n + ' pending notification(s)');
  toast('Cleared ' + n + ' pending notifications', 'success');
  render();
}

// Tick every 5s to check time limit + update countdowns
setInterval(function() {
  var nowTs = Date.now();
  var anyFired = false;
  Object.keys(STATE.pendingBatches).forEach(function(editor) {
    var batch = STATE.pendingBatches[editor];
    if (batch.items.length > 0 && batch.firstQueuedAt !== null) {
      if (nowTs - batch.firstQueuedAt >= BATCH_TIME_LIMIT_MS) {
        fireBatch(editor, 'time-limit');
        anyFired = true;
      }
    }
  });
  // Re-render notifications tab passively so countdown stays live
  if (STATE.tab === 'notifications' || anyFired) render();
}, 5000);

// ===================== SCHEDULER =====================
function isWeekend(isoDate) {
  var d = new Date(isoDate + 'T12:00:00');
  var day = d.getDay();
  return day === 0 || day === 6;
}

function priorityKey(asset) {
  var camp = findCampaignById(asset.campaignId);
  return { country: camp ? camp.country : 'ZZ', subRank: camp ? camp.rank : 999, pn: asset.pn };
}

function sortByPriority(assets, countryOrder) {
  var idx = {};
  countryOrder.forEach(function(c, i) { idx[c] = i; });
  return assets.slice().sort(function(a, b) {
    var ka = priorityKey(a), kb = priorityKey(b);
    var ia = idx[ka.country]; if (ia === undefined) ia = 999;
    var ib = idx[kb.country]; if (ib === undefined) ib = 999;
    if (ia !== ib) return ia - ib;
    if (ka.subRank !== kb.subRank) return ka.subRank - kb.subRank;
    return ka.pn - kb.pn;
  });
}

function computeDayPlan() {
  var plans = { Zidni: [], Sharm: [], Patty: [] };
  var alerts = [];
  var overflow = [];
  var used = {};

  function availableFor(editor) {
    return STATE.assets.filter(function(a) {
      if (used[a.id] || a.released || a.scheduledFor || a.status === 'Approved') return false;
      return a.editor === editor;
    });
  }

  ['Zidni', 'Sharm', 'Patty'].forEach(function(editor) {
    var rules = EDITOR_RULES[editor];
    var pool = sortByPriority(availableFor(editor), rules.countryOrder);
    var ideal = Object.assign({}, rules.idealMix);

    for (var d = 0; d < DIFFICULTIES.length; d++) {
      var diff = DIFFICULTIES[d];
      var need = ideal[diff] || 0;
      while (need > 0 && plans[editor].length < rules.cap) {
        var found = null;
        for (var i = 0; i < pool.length; i++) if (pool[i].difficulty === diff) { found = pool[i]; break; }
        if (!found) break;
        plans[editor].push(found);
        used[found.id] = true;
        pool = pool.filter(function(x) { return x.id !== found.id; });
        need--;
      }
    }
    while (plans[editor].length < rules.cap && pool.length > 0) {
      var pick = pool.shift();
      plans[editor].push(pick);
      used[pick.id] = true;
    }

    if (plans[editor].length === 0) {
      alerts.push(editor + ' has no videos matching their skill level \u2014 reassign manually');
    }
  });

  // Overflow: Zidni absorbs videos assigned to editors who can't handle them
  if (plans.Zidni.length < EDITOR_RULES.Zidni.cap) {
    var slotsLeft = EDITOR_RULES.Zidni.cap - plans.Zidni.length;
    STATE.assets.forEach(function(a) {
      if (slotsLeft <= 0 || used[a.id] || a.released || a.scheduledFor || a.status === 'Approved') return;
      var allowed = EDITOR_ALLOWED_DIFF[a.editor] || [];
      if (allowed.indexOf(a.difficulty) < 0) {
        plans.Zidni.push(a);
        used[a.id] = true;
        overflow.push({ from: a.editor, to: 'Zidni', asset: a });
        slotsLeft--;
      }
    });
    plans.Zidni = sortByPriority(plans.Zidni, EDITOR_RULES.Zidni.countryOrder);
  }

  return { plans: plans, alerts: alerts, overflow: overflow };
}

function runScheduler() {
  var dateStr = STATE.schedulerDate;
  if (isWeekend(dateStr) && !STATE.schedulerIncludeWeekends) {
    toast('Weekend skipped. Enable override if you want to drop today.', 'error');
    return;
  }
  var result = computeDayPlan();
  var totalScheduled = 0;

  Object.keys(result.plans).forEach(function(editor) {
    var list = result.plans[editor];
    list.forEach(function(a) { a.scheduledFor = dateStr; totalScheduled++; });
    if (list.length) {
      logAction('scheduled', editor + ': ' + list.length + ' video(s) scheduled for ' + dateStr);
    }
  });
  result.overflow.forEach(function(o) { logAction('updated', 'Overflow: ' + o.asset.name + ' \u2192 Zidni (from ' + o.from + ')'); });
  result.alerts.forEach(function(msg) { logAction('updated', 'ALERT: ' + msg); });

  toast(totalScheduled ? 'Scheduled ' + totalScheduled + ' videos for ' + dateStr : 'No videos scheduled (queues empty?)', totalScheduled ? 'success' : 'error');
  render();
}

function clearSchedule() {
  var dateStr = STATE.schedulerDate, cleared = 0;
  STATE.assets.forEach(function(a) {
    if (a.scheduledFor === dateStr && !a.released) { a.scheduledFor = ''; cleared++; }
  });
  if (cleared) logAction('updated', 'Cleared ' + cleared + ' scheduled videos for ' + dateStr);
  toast(cleared ? 'Cleared ' + cleared + ' scheduled videos' : 'Nothing to clear', cleared ? 'success' : '');
  render();
}

function releaseScheduled() {
  var dateStr = STATE.schedulerDate;
  var byEditor = {};
  STATE.assets.forEach(function(a) {
    if (a.scheduledFor === dateStr && !a.released) {
      a.released = true;
      byEditor[a.editor] = (byEditor[a.editor] || []);
      byEditor[a.editor].push(a);
    }
  });

  var total = 0;
  Object.keys(byEditor).forEach(function(editor) {
    var list = byEditor[editor];
    total += list.length;
    // Daily drop is a direct send (not batched) because it's already a batch
    var lines = [':clapper: *Daily queue for ' + editor + '* (' + dateStr + ')'];
    list.forEach(function(a, i) { lines.push('  ' + (i+1) + '. ' + a.name + '  _(' + a.difficulty + ')_'); });
    STATE.sentNotifications.unshift({
      time: timeStamp(), editor: editor,
      items: list.map(function(a) { return { name: a.name, change: 'daily-queue' }; }),
      reason: 'daily-drop', body: lines.join('\n')
    });
    logAction('notified', editor + ' \u2014 daily queue sent (' + list.length + ' videos)');
  });
  if (STATE.sentNotifications.length > 20) STATE.sentNotifications = STATE.sentNotifications.slice(0, 20);

  toast(total ? 'Released ' + total + ' videos + sent daily queue pings' : 'Nothing to release', total ? 'success' : '');
  render();
}

// Replace the picker markup in-place inside an open modal without closing it.
// Preserves the "which category is selected" signal by reading the current <select>
// value (or accepting an override via `selectThis`). Called after add/rename/delete
// operations that change STATE.categories.
function refreshModalCategoryPicker(selectThis) {
  var row = document.getElementById('f-ccat-row');
  if (!row) return; // picker not currently rendered (modal closed)
  var container = row.parentNode; // the form-row wrapping the picker
  if (!container) return;

  // Determine which category name to highlight in the rebuilt picker
  var current;
  if (selectThis !== undefined) {
    current = selectThis;
  } else {
    var sel = document.getElementById('f-ccat');
    current = sel ? sel.value : '';
  }

  // Build the new form-row in a detached container, then swap the whole wrapper.
  // categoryPickerHtml returns a full form-row; we replace `container` with its contents.
  var tmp = document.createElement('div');
  tmp.innerHTML = categoryPickerHtml(current);
  var newFormRow = tmp.firstChild;
  if (!newFormRow) return; // defensive: if markup generation ever returns empty, no-op

  // Collect the new form-row's children into an array FIRST, because appending moves
  // them out of `newFormRow` and would confuse in-place iteration.
  var newChildren = [];
  while (newFormRow.firstChild) {
    newChildren.push(newFormRow.firstChild);
    newFormRow.removeChild(newFormRow.firstChild);
  }

  // Clear the existing form-row contents and insert the new ones.
  while (container.firstChild) container.removeChild(container.firstChild);
  for (var i = 0; i < newChildren.length; i++) container.appendChild(newChildren[i]);
}

function reorderCampaigns(silent) {
  // Rank by CURRENT array position within each country. We deliberately do NOT use
  // getSubCampaignsForCountry() here \u2014 that sorts by rank, which means it would read back
  // the very values we're about to overwrite, producing a no-op. Instead, walk
  // STATE.campaigns in its raw order and assign ranks per-country as we encounter them.
  var counters = {};
  for (var i = 0; i < STATE.campaigns.length; i++) {
    var c = STATE.campaigns[i];
    counters[c.country] = (counters[c.country] || 0) + 1;
    c.rank = counters[c.country];
  }
  if (!silent) { logAction('updated', 'Sub-campaigns re-ranked within each country'); toast('Sub-campaigns reordered', 'success'); }
}

// ===================== DRAG-AND-DROP REORDER =====================
// Transient drag state for sub-campaign reordering. Not persisted.
var DragState = { srcId: null, srcCountry: null };

// Remove all drag-over highlights from every subcamp-item in the DOM.
// Cheap: there aren't many items on screen. Called on drag leave / drop / dragend.
function clearDragOverClasses() {
  var items = document.querySelectorAll('.subcamp-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove('drag-over-top', 'drag-over-bottom', 'drag-blocked');
  }

// Move a campaign to a new position within its own country.
// `targetId` is the campaign we hovered over; `placeBefore` is true if the
// drop was in the upper half of the target, false for the lower half.
// Re-ranks the whole country afterward so `rank` reflects final order.
function moveCampaignWithinCountry(srcId, targetId, placeBefore) {
  var src = findCampaignById(srcId);
  var target = findCampaignById(targetId);
  if (!src || !target || src.country !== target.country) return false;
  if (srcId === targetId) return false;

  // Work against the current ordered list within the country.
  // Remove src from STATE.campaigns, then re-insert at the computed index.
  var countryCode = src.country;
  var beforeSrcCount = 0;
  STATE.campaigns = STATE.campaigns.filter(function(c) { return c.id !== srcId; });
  var siblings = getSubCampaignsForCountry(countryCode);
  var targetIdx = -1;
  for (var i = 0; i < siblings.length; i++) {
    if (siblings[i].id === targetId) { targetIdx = i; break; }
  }
  if (targetIdx < 0) { // shouldn't happen; push src back to end and bail
    STATE.campaigns.push(src);
    reorderCampaigns(true);
    return false;
  }
  var insertIdx = placeBefore ? targetIdx : targetIdx + 1;
  // Compute the index within STATE.campaigns to splice into: we want src to
  // land at `insertIdx` inside the country's ordered siblings list.
  var globalInsertIdx;
  if (insertIdx >= siblings.length) {
    // after the last sibling \u2014 find index just after the last sibling in STATE.campaigns
    var lastSibling = siblings[siblings.length - 1];
    for (var k = 0; k < STATE.campaigns.length; k++) {
      if (STATE.campaigns[k].id === lastSibling.id) { globalInsertIdx = k + 1; break; }
    }
  } else {
    var pivot = siblings[insertIdx];
    for (var m = 0; m < STATE.campaigns.length; m++) {
      if (STATE.campaigns[m].id === pivot.id) { globalInsertIdx = m; break; }
    }
  }
  if (globalInsertIdx === undefined) globalInsertIdx = STATE.campaigns.length;
  STATE.campaigns.splice(globalInsertIdx, 0, src);
  reorderCampaigns(true);
  logAction('updated', 'Reordered "' + src.name + '" within ' + countryCode);
  return true;
}

function getNextPn(campaignId) {
  var pns = STATE.assets.filter(function(a) { return a.campaignId === campaignId; }).map(function(a) { return a.pn; });
  return pns.length ? Math.max.apply(null, pns) + 1 : 1;
}

// Given an editor change, compute the resulting status.
// - Editor added to Draft -> Assigned
// - Editor removed (set to empty) -> Draft
// - Otherwise honor the user's chosenStatus as-is
function applyEditorAutoStatus(oldEditor, newEditor, oldStatus, chosenStatus) {
  if (!oldEditor && newEditor && chosenStatus === 'Draft') return 'Assigned';
  if (oldEditor && !newEditor) return 'Draft';
  return chosenStatus;
}

function deleteAsset(id) {
  var a = null;
  for (var i = 0; i < STATE.assets.length; i++) if (STATE.assets[i].id === id) { a = STATE.assets[i]; break; }
  if (!a) return;
  if (!confirm('Delete "' + a.name + '"?')) return;
  STATE.assets = STATE.assets.filter(function(x) { return x.id !== id; });
  logAction('deleted', 'Asset "' + a.name + '" deleted');
  toast('Asset deleted', 'success');
  render();
}

// Duplicate an asset. New row keeps the editor, resets status to Draft, gets a new id
// and a new pn (next available in that campaign), appends "_copy" to the name.
// Resets scheduledFor/released/dateApproved/finalVideo since those are per-asset workflow state.
function duplicateAsset(id) {
  var src = null;
  for (var i = 0; i < STATE.assets.length; i++) if (STATE.assets[i].id === id) { src = STATE.assets[i]; break; }
  if (!src) return;
  var copy = {
    id: STATE.nextAssetId++,
    pn: getNextPn(src.campaignId),
    campaignId: src.campaignId,
    name: src.name + '_copy',
    category: src.category,
    rawVideo: src.rawVideo,
    editingBrief: src.editingBrief,
    editor: src.editor,
    difficulty: src.difficulty,
    finalVideo: '',           // cleared \u2014 per-workflow state
    estDelivery: src.estDelivery,
    dateApproved: '',         // cleared
    scheduledFor: '',          // cleared
    released: false,
    status: 'Draft',           // reset per spec; auto-flips to Assigned below if editor is present
    version: src.version
  };
  // If editor is kept, auto-flip status just like the modal would.
  if (copy.editor) copy.status = 'Assigned';
  STATE.assets.push(copy);
  logAction('created', 'Asset "' + src.name + '" duplicated as "' + copy.name + '"');
  // Same notification flow as a new asset with an editor: triggers an "assigned" ping if editor present.
  emitAssetChangeNotifications(copy, { oldEditor: '', oldStatus: null, isNew: true });
  toast('Duplicated as "' + copy.name + '"', 'success');
  render();
}

            '<span class="plan-slot-name">' + escapeHtml(a.name) + '</span>' +
            '<span class="diff-badge diff-' + a.difficulty + '">' + a.difficulty + '</span>' +
            '<span class="plan-slot-country flag-' + code + '">' + code + '</span></div>';
        }).join('');

    plansHtml +=
      '<div class="editor-plan ' + (isAlert ? 'alert' : '') + '">' +
        '<div class="editor-plan-header">' +
          '<div class="editor-avatar av-' + editor + '">' + editorInitials(editor) + '</div>' +
          '<div><div class="editor-plan-name">' + editor + '</div>' +
          '<div class="editor-plan-rules-inline">Ideal mix: ' + mixStr + ' \u00B7 Cap: ' + rules.cap + ' \u00B7 Priority: ' + countryStr + '</div></div>' +
          '<div class="editor-plan-rules">' + list.length + '/' + rules.cap + ' slots</div>' +
        '</div>' +
        '<div class="plan-slots">' + slotsHtml + '</div>' +
      '</div>';
  });

  var alertsHtml = result.alerts.length ? result.alerts.map(function(m) { return '<div class="alert-box">\u26A0 ' + escapeHtml(m) + '</div>'; }).join('') : '';
  var overflowHtml = result.overflow.length
    ? '<div class="auto-card"><div class="auto-title" style="margin-bottom:8px;">Overflow routing</div>' +
      result.overflow.map(function(o) { return '<div style="font-size:12px;color:var(--text2);padding:4px 0;font-family:monospace;">\u27A4 "' + escapeHtml(o.asset.name) + '" \u2014 ' + o.from + ' cannot handle ' + o.asset.difficulty + ', absorbed by Zidni</div>'; }).join('') + '</div>'
    : '';
  var weekendNote = weekend ? '<div class="alert-box" style="background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-text);">\u26A0 ' + dateStr + ' is a weekend. ' + (STATE.schedulerIncludeWeekends ? 'Override ON \u2014 scheduler will run.' : 'Scheduler will skip unless override is checked.') + '</div>' : '';

  return '<div class="content"><div class="scheduler-panel">' +
    '<div class="section-title">Daily Scheduler</div>' +
    '<div class="auto-card">' +
      '<div class="auto-header"><div class="auto-icon">\u23F0</div><div><div class="auto-title">3:00 PM Daily Drop</div><div class="auto-sub">Mon-Fri \u00B7 auto-picks videos per editor based on difficulty + country priority</div></div></div>' +
      '<div class="auto-desc">Preview today\'s plan below. Slack pings fire only when you release.</div>' +
      '<div class="scheduler-config-row">' +
        '<div class="scheduler-date-pick"><span>Plan for:</span><input type="date" value="' + dateStr + '" onchange="App.setSchedulerDate(this.value)"></div>' +
        '<label class="checkbox-row"><input type="checkbox" ' + (STATE.schedulerIncludeWeekends ? 'checked' : '') + ' onchange="App.toggleWeekends(this.checked)"> Override weekend skip</label>' +
      '</div>' +
      weekendNote +
      '<div style="margin-top:14px; display:flex; gap:8px; flex-wrap:wrap;">' +
        '<button class="run-btn" onclick="App.runScheduler()">\u25B6 Run scheduler (stamp Scheduled For)</button>' +
        '<button class="run-btn secondary" onclick="App.clearSchedule()">Clear unscheduled</button>' +
        '<button class="run-btn" style="background:var(--green-bg);color:var(--green-text);border-color:var(--green);" onclick="App.releaseScheduled()">\u{1F4E8} Release & notify editors</button>' +
      '</div>' +
    '</div>' +
    '<div class="section-title">Plan for ' + dateStr + '</div>' +
    alertsHtml +
    '<div class="editor-plans">' + plansHtml + '</div>' +
    overflowHtml +
    '<div class="auto-card"><div class="auto-title" style="margin-bottom:8px;">Elsa \u2014 manual only</div><div class="auto-desc">Elsa never gets scheduled by the daily drop, but she does receive reactive Slack pings when you manually assign her a video or change one of her tasks. See the Notifications tab for her queue.</div></div>' +
    '</div></div>';
}

function renderNotificationsView() {
  // Any webhook configured at all? (for the top-level warning banner only)
  var cw = STATE.countryWebhooks || {};
  var anyWebhookReady = webhookValid(STATE.webhookUrl)
    || Object.keys(cw).some(function(k) { return webhookValid(cw[k]); });
  var isFileProtocol = location.protocol === 'file:';
  var fileBanner = isFileProtocol
    ? '<div class="alert-box" style="margin-bottom:12px;">\u26A0 You\'re running this file via <code style="font-family:monospace; background:var(--bg4); padding:1px 5px; border-radius:3px;">file://</code>. Safari and Firefox block webhook requests from this origin. Slack sends may fail or fall back to blind mode (no delivery confirmation). For reliable sends, host the file on a local server \u2014 e.g. <code style="font-family:monospace; background:var(--bg4); padding:1px 5px; border-radius:3px;">python3 -m http.server</code> then open <code style="font-family:monospace; background:var(--bg4); padding:1px 5px; border-radius:3px;">http://localhost:8000/campaign-manager.html</code>.</div>'
    : '';

  // Batch card renderer, used for both editor and PM-country batches.
  function renderBatchCard(recipient) {
    var isPm = recipient.indexOf('PM:') === 0;
    var countryCode = isPm ? recipient.slice(3) : null;
    var displayName = isPm ? (countryCode + ' \u2014 PM review queue') : recipient;
    var avatarHtml = isPm
      ? '<div class="pm-avatar" title="PM review queue for ' + countryCode + '">' +
          '<div class="country-flag flag-PM" style="width:28px; height:20px; font-size:10px;">PM</div>' +
          '<div class="country-flag flag-' + countryCode + '" style="width:20px; height:14px; font-size:8px;">' + countryCode + '</div>' +
        '</div>'
      : '<div class="editor-avatar av-' + recipient + '">' + editorInitials(recipient) + '</div>';

    var batch = STATE.pendingBatches[recipient] || { items: [], firstQueuedAt: null };
    var count = batch.items.length;
    var timeRemaining = '';
    var progressPct = 0;
    var cardClass = 'empty';
    var progressClass = '';

    if (count > 0) {
      if (count >= BATCH_SIZE_LIMIT) { cardClass = 'ready'; progressClass = 'ready'; progressPct = 100; }
      else if (batch.firstQueuedAt) {
        var elapsed = Date.now() - batch.firstQueuedAt;
        var remaining = Math.max(0, BATCH_TIME_LIMIT_MS - elapsed);
        var pctTime = Math.min(100, (elapsed / BATCH_TIME_LIMIT_MS) * 100);
        var pctSize = (count / BATCH_SIZE_LIMIT) * 100;
        progressPct = Math.max(pctTime, pctSize);
        var mins = Math.floor(remaining / 60000);
        var secs = Math.floor((remaining % 60000) / 1000);
        timeRemaining = 'fires in ~' + mins + 'm ' + String(secs).padStart(2,'0') + 's';
        // Warn (color shift) when less than 1/6 of the batch time window is left. Scales
        // with BATCH_TIME_LIMIT_MS so short windows still show a meaningful warn state.
        var warnThreshold = BATCH_TIME_LIMIT_MS / 6;
        cardClass = remaining < warnThreshold ? 'warn' : '';
        progressClass = remaining < warnThreshold ? 'warn' : '';
      }
    }

    var itemsHtml = count === 0
      ? '<div style="padding:20px; text-align:center; color:var(--text3); font-size:12px; background:var(--bg3); border-radius:6px; border:1px dashed var(--border2);">No pending notifications</div>'
      : batch.items.map(function(it, i) {
          var changeLabel = ({ 'assigned': 'new assignment', 'for-review': 'ready for review', 'needs-revisions': 'needs revisions', 'created': 'new task', 'reassigned': 'reassigned', 'status': 'status change' })[it.change] || it.change;
          var detailHtml = it.detail
            ? '<div style="grid-column:1/-1; font-size:10.5px; color:var(--text3); font-family:\'JetBrains Mono\', monospace; padding:2px 0 0 22px; word-break:break-all;">' + escapeHtml(it.detail) + '</div>'
            : '';
          return '<div class="batch-item" style="display:grid; grid-template-columns:auto 1fr auto; align-items:center; column-gap:8px; row-gap:0;">' +
            '<span class="batch-item-idx">' + (i+1) + '.</span>' +
            '<span class="batch-item-name">' + escapeHtml(it.name) + '</span>' +
            '<span class="batch-item-change change-' + it.change + '">' + changeLabel + '</span>' +
            detailHtml +
          '</div>';
        }).join('');

    var statusLabel = count >= BATCH_SIZE_LIMIT ? 'ready to fire'
      : count === 0 ? 'empty'
      : timeRemaining || (count + '/' + BATCH_SIZE_LIMIT + ' queued');

    // Per-card webhook readiness. For mixed-country editor batches, "ready" means
    // we auto-split AND at least one country group resolves to a valid webhook.
    // For everything else (PM batches, single-country editor, user overrode split),
    // we resolve once against the whole window and check validity.
    var previewItems = batch.items.slice(0, BATCH_SIZE_LIMIT);

    // Figure out country shape of this batch
    var batchCountries = {};
    previewItems.forEach(function(it) { if (it.country) batchCountries[it.country] = true; });
    var batchCountryList = Object.keys(batchCountries);
    var isMixedEditorBatch = !isPm && batchCountryList.length > 1;
    var userWantsNoSplit = !!STATE.noSplit[recipient];
    var willSplit = isMixedEditorBatch && !userWantsNoSplit;

    var resolvedUrl, cardWebhookReady, splitGroupsStatus = null;
    if (willSplit) {
      // Per-group resolution. Ready if any group resolves.
      splitGroupsStatus = groupItemsByCountry(previewItems).map(function(g) {
        var u = resolveWebhookForEditor(recipient, g.items);
        return { country: g.country, count: g.items.length, ok: webhookValid(u) };
      });
      cardWebhookReady = splitGroupsStatus.some(function(s) { return s.ok; });
      resolvedUrl = null; // not meaningful in split mode
    } else {
      resolvedUrl = resolveWebhookForEditor(recipient, previewItems);
      cardWebhookReady = webhookValid(resolvedUrl);
    }

    var soloCountry = batchCountryList.length === 1 ? batchCountryList[0] : null;
    var cwMap = STATE.countryWebhooks || {};
    var usingFallback = !willSplit && cardWebhookReady && !(isPm
      ? webhookValid(cwMap[countryCode])
      : (soloCountry && webhookValid(cwMap[soloCountry])));

    var sendTitle;
    if (willSplit) {
      // Summarize per-group readiness
      var okGroups = splitGroupsStatus.filter(function(s) { return s.ok; });
      var badGroups = splitGroupsStatus.filter(function(s) { return !s.ok; });
      if (badGroups.length === 0) {
        sendTitle = 'Auto-split: POST ' + splitGroupsStatus.length + ' messages, one per country (' +
          splitGroupsStatus.map(function(s) { return s.country + '\u00D7' + s.count; }).join(', ') + ')';
      } else if (okGroups.length === 0) {
        sendTitle = 'Auto-split: no country webhooks set (' + badGroups.map(function(s) { return s.country; }).join(', ') + '), and no global fallback \u2014 set one in Automations';
      } else {
        sendTitle = 'Auto-split: ' + okGroups.length + ' group(s) will send (' + okGroups.map(function(s) { return s.country; }).join(', ') +
          '); ' + badGroups.length + ' will be skipped (' + badGroups.map(function(s) { return s.country; }).join(', ') + ') \u2014 set their webhooks';
      }
    } else if (cardWebhookReady) {
      if (isPm) {
        sendTitle = usingFallback
          ? 'POST to Slack via global fallback (no ' + countryCode + ' webhook set)'
          : 'POST to the ' + countryCode + ' country webhook';
      } else if (isMixedEditorBatch) {
        // Mixed + user forced no-split
        sendTitle = 'Mixed-country batch (' + batchCountryList.join(', ') + '), split disabled \u2014 will POST as one message via global fallback';
      } else if (soloCountry) {
        sendTitle = usingFallback
          ? 'POST via global fallback (no ' + soloCountry + ' webhook set)'
          : 'POST to the ' + soloCountry + ' country webhook';
      } else {
        sendTitle = 'POST to Slack via webhook';
      }
    } else {
      if (isPm) {
        sendTitle = 'No webhook for ' + countryCode + ' and no global fallback \u2014 set one in Automations';
      } else if (isMixedEditorBatch) {
        sendTitle = 'Mixed-country batch, split disabled, and no global fallback \u2014 set one in Automations';
      } else if (soloCountry) {
        sendTitle = 'No webhook for ' + soloCountry + ' and no global fallback \u2014 set one in Automations';
      } else {
        sendTitle = 'No webhook configured \u2014 set one in Automations';
      }
    }

    var sendBtnAttrs = cardWebhookReady
      ? 'class="batch-flush-btn" title="' + escapeHtml(sendTitle) + '"'
      : 'class="batch-flush-btn" title="' + escapeHtml(sendTitle) + '" disabled style="opacity:0.45; cursor:not-allowed;"';

    // Split toggle: only shown for editor cards whose pending batch window spans >1 country.
    // Checkbox is checked when split IS active (i.e. !noSplit). Reason for that orientation:
    // splitting is the default/recommended behavior, so "checked = default" reads cleanly.
    var splitToggle = '';
    if (isMixedEditorBatch) {
      var cntrySummary = batchCountryList.join(' + ');
      var toggleLabel = willSplit
        ? 'Auto-splitting by country (' + cntrySummary + ')'
        : 'Split disabled \u2014 will send as one message';
      splitToggle =
        '<label class="batch-split-toggle" title="When on, sends one Slack message per country using that country\u2019s webhook. When off, sends the whole batch as one message via the global fallback.">' +
          '<input type="checkbox" onchange="App.toggleSplit(\'' + recipient + '\', this.checked)"' + (willSplit ? ' checked' : '') + '>' +
          '<span>' + escapeHtml(toggleLabel) + '</span>' +
        '</label>';
    }

    // PM batches have no per-editor Slack channel, so hide the Open Slack button for them
    var openSlackBtn = isPm ? '' : '<button class="batch-slack-btn" title="Open Slack channel" onclick="App.openSlack(\'' + recipient + '\')">\u{1F517}</button>';

    var actions = count > 0
      ? '<div class="batch-actions">' +
          '<button ' + sendBtnAttrs + ' onclick="App.sendBatch(\'' + recipient + '\')">\u{1F680} Send</button>' +
          '<button class="batch-copy-btn" title="Copy Slack-formatted message" onclick="App.copyMessage(' + JSON.stringify(buildBatchMessage(recipient, batch.items.slice(0, BATCH_SIZE_LIMIT))).replace(/"/g, '&quot;') + ', \'Copied \u2014 paste into Slack\')">\u{1F4CB}</button>' +
          openSlackBtn +
          '<button class="batch-copy-btn" title="Mark sent in-app without POSTing to Slack (dry-run)" onclick="App.flushBatch(\'' + recipient + '\')">\u{1F4E8}</button>' +
          '<button class="batch-clear-btn" onclick="App.clearBatchCmd(\'' + recipient + '\')">Clear</button>' +
        '</div>' + splitToggle
      : '';

    return '<div class="batch-card ' + cardClass + '">' +
      '<div class="batch-card-header">' +
        avatarHtml +
        '<div class="batch-card-title">' + displayName + '</div>' +
        '<div class="batch-header-right">' + statusLabel + '</div>' +
      '</div>' +
      '<div class="batch-progress-bar"><div class="batch-progress-fill ' + progressClass + '" style="width:' + progressPct + '%;"></div></div>' +
      '<div class="batch-items">' + itemsHtml + '</div>' +
      actions +
    '</div>';
  }

  var editorCards = EDITORS.map(renderBatchCard).join('');
  var pmCards = STATE.countries.map(function(c) { return renderBatchCard('PM:' + c.code); }).join('');

  // Sent notifications log
  var sentHtml = STATE.sentNotifications.length === 0
    ? '<div style="padding:40px; text-align:center; color:var(--text3); font-size:13px;">No notifications sent yet. Try adding, reassigning, or changing the status of a video asset.</div>'
    : STATE.sentNotifications.map(function(n, idx) {
        var reasonLabel = ({ 'size-limit': '3 videos queued', 'time-limit': '1-min timer', 'daily-drop': 'daily 3 PM drop', 'manual': 'manual flush', 'sent-live': 'sent to Slack \u2713', 'sent-blind': 'sent blind (unconfirmed)' })[n.reason] || n.reason;
        var bodyEsc = JSON.stringify(n.body).replace(/"/g, '&quot;');
        // Resend routes to the same country this entry was originally sent to.
        var resendUrl = resolveWebhookForEditor(n.editor, n.items);
        var resendReady = webhookValid(resendUrl);
        var resendAttrs = resendReady
          ? 'class="sent-copy-btn" title="Re-send to Slack"'
          : 'class="sent-copy-btn" title="No webhook configured for this route \u2014 set one in Automations" disabled style="opacity:0.45; cursor:not-allowed;"';
        // PM entries get the same compound PM avatar + country chip used on pending cards,
        // and a cleaner label ('PM review \u2014 UK') instead of the raw 'PM:UK' recipient key.
        var isPmEntry = typeof n.editor === 'string' && n.editor.indexOf('PM:') === 0;
        var pmCountry = isPmEntry ? n.editor.slice(3) : null;
        var avatarHtml = isPmEntry
          ? '<div class="pm-avatar" title="PM review queue for ' + pmCountry + '">' +
              '<div class="country-flag flag-PM" style="width:28px; height:20px; font-size:10px;">PM</div>' +
              '<div class="country-flag flag-' + pmCountry + '" style="width:20px; height:14px; font-size:8px;">' + pmCountry + '</div>' +
            '</div>'
          : '<div class="editor-avatar av-' + n.editor + '">' + editorInitials(n.editor) + '</div>';
        var displayName = isPmEntry ? ('PM review \u2014 ' + pmCountry) : n.editor;
        return '<div class="sent-entry">' +
          '<div class="sent-entry-header">' +
            avatarHtml +
            '<div style="font-size:13px; font-weight:600;">' + displayName + '</div>' +
            '<span style="font-size:10px; padding:2px 6px; background:var(--bg4); color:var(--text2); border-radius:3px; font-family:monospace;">' + reasonLabel + '</span>' +
            '<span class="sent-entry-time">' + n.time + '</span>' +
            '<button ' + resendAttrs + ' onclick="App.resendSent(' + idx + ')">\u{1F680}</button>' +
            '<button class="sent-copy-btn" title="Copy message" onclick="App.copyMessage(' + bodyEsc + ', \'Copied\')">\u{1F4CB}</button>' +
            '<button class="sent-copy-btn" title="Open Slack" onclick="App.openSlack(\'' + n.editor + '\')">\u{1F517}</button>' +
          '</div>' +
          '<div class="sent-entry-body">' + escapeHtml(n.body) + '</div>' +
        '</div>';
      }).join('');

  return '<div class="content"><div class="notif-panel">' +
    fileBanner +
    '<div class="section-title">Pending Batches <button class="run-btn" style="margin-left:auto; padding:5px 12px; font-size:12px;" onclick="App.showExport()">\u{1F4E4} Export for editor</button></div>' +
    '<div class="auto-card">' +
      '<div class="auto-desc" style="margin:0 0 6px;">Notifications queue and fire as a batch Slack message when either <strong style="color:var(--text1);">3 video updates</strong> accumulate or <strong style="color:var(--text1);">1 minute</strong> has passed since the first update \u2014 whichever comes first. Try editing a video in the Campaigns tab to see it queue here.</div>' +
      '<div class="auto-desc" style="margin:0; font-size:11.5px; color:var(--text3);"><strong style="color:var(--text2);">Button legend:</strong> \u{1F680} POST to Slack via webhook \u00B7 \u{1F4CB} copy to clipboard \u00B7 \u{1F517} open Slack channel \u00B7 \u{1F4E8} mark sent in-app without posting (dry-run) \u00B7 Clear discards the batch. ' +
        (anyWebhookReady ? '' : '<span style="color:var(--amber-text);">\u26A0 No webhooks configured yet \u2014 set a global fallback or per-country webhook in Automations to enable \u{1F680} Send.</span>') +
      '</div>' +
      '<div class="batch-grid">' + editorCards + '</div>' +
    '</div>' +
    '<div class="section-title">PM Review Queues <span style="font-weight:400; color:var(--text3); margin-left:6px; font-size:10px;">(fires to country webhook when a video flips to For Review)</span></div>' +
    '<div class="auto-card">' +
      '<div class="batch-grid">' + pmCards + '</div>' +
    '</div>' +
    '<div class="section-title">Sent Notifications (last 20)</div>' +
    '<div class="auto-card"><div class="sent-log">' + sentHtml + '</div></div>' +
  '</div></div>';
}

function renderAutomationsView() {
  var logHtml = STATE.activityLog.map(function(l) {
    return '<div class="log-entry"><span class="log-time">' + l.time + '</span>' +
      '<div class="log-msg"><span class="log-tag tag-' + l.tag + '">' + l.tag + '</span>' + escapeHtml(l.msg) + '</div></div>';
  }).join('');

  return '<div class="content"><div class="automation-panel">' +
    '<div class="section-title">Automations</div>' +

    '<div class="auto-card">' +
      '<div class="auto-header"><div class="auto-icon">01</div><div><div class="auto-title">Auto-reorder Sub-Campaigns by Rank</div><div class="auto-sub">trigger: Campaigns.Rank field updated</div></div></div>' +
      '<div class="auto-desc">When a campaign\'s rank changes, re-numbers sub-campaigns 1, 2, 3\u2026 inside each country. Run manually via the sidebar button or set up as a scheduled automation.</div>' +
      '<button class="run-btn" style="margin-top:8px;" onclick="App.reorderCampaigns(false)">\u25B6 Run reorder now</button>' +
    '</div>' +

    '<div class="auto-card">' +
      '<div class="auto-header"><div class="auto-icon">02</div><div><div class="auto-title">Daily Scheduler \u2014 3 PM, Mon\u2013Fri</div><div class="auto-sub">picks per editor based on difficulty mix + country priority</div></div></div>' +
      '<div class="auto-desc">For Zidni, Sharm, Patty: picks the next batch of videos fitting their ideal mix. Zidni absorbs overflow when others can\'t handle a difficulty. Elsa is excluded from this automation but still receives reactive notifications. Open the <strong>Scheduler</strong> tab to preview and run.</div>' +
    '</div>' +

    '<div class="auto-card">' +
      '<div class="auto-header"><div class="auto-icon">03</div><div><div class="auto-title">Editor Notifications \u2014 hybrid batch</div><div class="auto-sub">trigger: video asset created, reassigned, or status changed</div></div></div>' +
      '<div class="auto-desc">' +
        'Fires when (a) a new video is assigned, (b) a video is reassigned, or (c) a video\'s status changes. ' +
        'Messages are batched: queue up to <strong style="color:var(--text1);">3 video updates</strong> OR wait <strong style="color:var(--text1);">1 minute</strong> from the first update \u2014 whichever comes first. ' +
        'Elsa is included (manual assignments still ping her). ' +
        'Open the <strong>Notifications</strong> tab to see pending batches and manually flush them.' +
      '</div>' +
    '</div>' +

    '<div class="auto-card">' +
      '<div class="auto-header"><div class="auto-icon">04</div><div><div class="auto-title">Slack Webhook \u2014 Global Fallback</div><div class="auto-sub">used when a country webhook isn\u2019t set</div></div></div>' +
      '<div class="auto-desc">Stores a catch-all <strong style="color:var(--text1);">Incoming Webhook URL</strong> (https://hooks.slack.com/services/...). This is used as a fallback for editor batches whose items span multiple countries, or when a country-specific webhook isn\u2019t set below. <em>Save</em> stores the URL locally; <em>Send test ping</em> actually POSTs a short message so you can verify Slack accepts it.</div>' +
      '<div class="webhook-row"><input type="text" id="webhook-input" value="' + escapeHtml(STATE.webhookUrl) + '" placeholder="https://hooks.slack.com/services/..."><button class="save-btn" onclick="App.saveWebhook()">Save locally</button><button class="edit-btn" onclick="App.testWebhook()" style="margin-left:4px;">\u{1F4E1} Send test ping</button></div>' +
    '</div>' +

    '<div class="auto-card">' +
      '<div class="auto-header"><div class="auto-icon">05</div><div><div class="auto-title">Slack Webhooks \u2014 Per Country</div><div class="auto-sub">PM review pings route here by country; editor batches use these when the batch is single-country</div></div></div>' +
      '<div class="auto-desc">One webhook per country. When a video flips to <strong style="color:var(--text1);">For Review</strong>, the PM review ping goes to that country\u2019s webhook. Editor batches (single-country) also use these. Empty rows fall through to the global fallback above. Save and Test are per-row.</div>' +
      '<div style="margin-top:10px;">' +
        STATE.countries.map(function(c) {
          var v = (STATE.countryWebhooks && STATE.countryWebhooks[c.code]) || '';
          var vEsc = escapeHtml(v);
          var valid = webhookValid(v);
          var empty = !v;
          // Dot color: green if valid webhook saved, red if something typed but invalid, dim if empty
          var dotClass = valid ? 'ok' : (empty ? '' : 'bad');
          var dotTitle = valid
            ? 'Valid webhook saved for ' + c.name
            : (empty
                ? 'No webhook saved \u2014 falls back to global'
                : 'Saved value doesn\u2019t look like a real webhook URL');
