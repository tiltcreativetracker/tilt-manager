  .log-day-card-num { font-size: 14px; font-weight: 600; color: var(--text1); font-family: 'JetBrains Mono', monospace; }
  .log-day-today-pill { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 1px 6px; border-radius: 3px; background: var(--accent); color: #fff; font-family: 'JetBrains Mono', monospace; }
  .log-day-card-stats { display: flex; align-items: baseline; gap: 4px; padding: 4px 10px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
  .log-day-card-num-big { font-size: 16px; font-weight: 700; }
  .log-day-card-slash { color: var(--text3); }
  .log-day-card-target { font-size: 13px; color: var(--text3); }
  .log-day-card-stats-label { font-size: 10px; color: var(--text3); margin-left: 4px; letter-spacing: 0.06em; text-transform: uppercase; }
  .log-day-card-stats.log-day-hit { background: var(--green-bg); color: var(--green-text); }
  .log-day-card-stats.log-day-hit .log-day-card-target,
  .log-day-card-stats.log-day-hit .log-day-card-stats-label { color: var(--green-text); opacity: 0.8; }
  .log-day-card-stats.log-day-partial { background: var(--amber-bg); color: var(--amber-text); }
  .log-day-card-stats.log-day-partial .log-day-card-target,
  .log-day-card-stats.log-day-partial .log-day-card-stats-label { color: var(--amber-text); opacity: 0.8; }
  .log-day-card-stats.log-day-miss { background: var(--bg4); color: var(--text3); }
  .log-day-card-body { display: flex; flex-direction: column; }
  .log-day-empty { padding: 14px 16px; font-style: italic; color: var(--text3); font-size: 12px; }
  .log-day-vid-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 14px; padding: 10px 14px; border-top: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .log-day-vid-row:first-child { border-top: none; }
  .log-day-vid-row:hover { background: var(--bg3); }
  .log-day-vid-row.is-done { opacity: 0.6; }
  .log-day-vid-row.is-done .log-day-vid-title { text-decoration: line-through; }
  .log-day-vid-name { min-width: 0; }
  .log-day-vid-title { font-size: 13px; color: var(--text1); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-day-vid-ver { display: inline-block; padding: 0 4px; border-radius: 2px; font-size: 9px; font-weight: 700; background: var(--accent-dim); color: var(--accent2); font-family: 'JetBrains Mono', monospace; vertical-align: middle; }
  .log-day-vid-camp { font-size: 10.5px; color: var(--text3); font-family: 'JetBrains Mono', monospace; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-day-vid-status { display: flex; align-items: center; }
  /* Category-head two-line cell: head name on top, QC verdict below as a colored pill. */
  .log-vid-chq { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; min-width: 110px; }
  .log-vid-chq-name { font-size: 10.5px; color: var(--text2); font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .log-vid-chq-muted { color: var(--text3); font-style: italic; }
  .log-vid-chq-status { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .log-vid-chq-status.log-chq-draft { background: var(--bg4); color: var(--text3); }
  .log-vid-chq-status.log-chq-review { background: var(--blue-bg); color: var(--blue-text); }
  .log-vid-chq-status.log-chq-revisions { background: var(--amber-bg); color: var(--amber-text); }
  .log-vid-chq-status.log-chq-approved { background: var(--green-bg); color: var(--green-text); }

  /* The table: a single grid with sticky day-header row + sticky approvals row, then video rows. */
  .log-grid { display: flex; flex-direction: column; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .log-grid-row { border-top: 1px solid var(--border); min-height: 40px; transition: background 0.1s; }
  .log-grid-row:first-child { border-top: none; }

  /* Day-header row (sticky at top of scroll). */
  .log-day-header-grid-row { background: var(--bg3); position: sticky; top: 0; z-index: 3; }
  .log-day-header-grid-row .log-day-head { padding: 7px 4px; text-align: center; border-left: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .log-day-header-grid-row .log-day-head:first-child { border-left: none; }
  .log-day-dow { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
  .log-day-date { font-size: 12px; color: var(--text1); font-weight: 500; margin-top: 1px; }
  .log-day-head.is-today { background: rgba(127,119,221,0.12); }
  .log-day-head.is-today .log-day-dow { color: var(--accent2); }
  .log-day-head.is-today .log-day-date { color: var(--accent2); }

  /* Approvals-per-day row (sticky below the day header). */
  .log-grid-row-header { background: rgba(127,119,221,0.05); border-top: 1px solid var(--border); position: sticky; top: 42px; z-index: 2; }

  .log-vid-name-cell { display: flex; flex-direction: column; justify-content: center; gap: 2px; padding: 6px 10px; border-right: 1px solid var(--border); min-width: 0; overflow: hidden; }
  .log-vid-name-cell-header { font-size: 10.5px; color: var(--text3); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; background: var(--bg3); }
  .log-vid-name-cell-sticky { /* reserved for future; header row already sticky */ }
  .log-vid-name { font-size: 12.5px; color: var(--text1); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-vid-sub { display: flex; gap: 6px; align-items: center; font-size: 10.5px; color: var(--text3); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-vid-ver { padding: 0 5px; background: var(--bg4); border-radius: 3px; color: var(--text2); }
  .log-vid-camp { color: var(--text3); overflow: hidden; text-overflow: ellipsis; }

  .log-vid-row { cursor: pointer; }
  .log-vid-row:hover { background: var(--bg3); }
  .log-vid-row.is-done { opacity: 0.55; }
  .log-vid-row.is-done .log-vid-name { text-decoration: line-through; text-decoration-color: var(--text3); }

  .log-vid-cell { display: flex; align-items: center; justify-content: center; border-left: 1px solid var(--border); padding: 5px 2px; }

  .log-status-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 600; letter-spacing: 0.04em; border: 1px solid transparent; line-height: 1.3; min-width: 24px; text-align: center; }
  .log-status-badge.st-draft    { color: var(--text3); background: var(--bg4); border-color: var(--border); }
  .log-status-badge.st-assigned { color: var(--accent2); border-color: rgba(127,119,221,0.35); background: var(--accent-dim); }
  .log-status-badge.st-inprog   { color: var(--amber-text); border-color: rgba(210,153,34,0.35); background: var(--amber-bg); }
  .log-status-badge.st-review   { color: #5eead4; border-color: rgba(94,234,212,0.35); background: rgba(94,234,212,0.08); }
  .log-status-badge.st-revisions{ color: var(--red-text); border-color: rgba(248,81,73,0.35); background: var(--red-bg); }
  .log-status-badge.st-approved { color: var(--green-text); border-color: rgba(63,185,80,0.35); background: var(--green-bg); }

  .log-approved-cell { display: flex; align-items: center; justify-content: center; gap: 2px; border-left: 1px solid var(--border); padding: 6px 2px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
  .log-approved-cell .log-approved-num { font-size: 14px; }
  .log-approved-cell .log-approved-slash { color: var(--text3); font-weight: 400; margin: 0 1px; }
  .log-approved-cell .log-approved-target { color: var(--text3); font-size: 11px; font-weight: 500; }
  .log-approved-hit { background: var(--green-bg); color: var(--green-text); }
  .log-approved-hit .log-approved-slash,
  .log-approved-hit .log-approved-target { color: var(--green-text); opacity: 0.7; }
  .log-approved-partial { background: var(--amber-bg); color: var(--amber-text); }
  .log-approved-partial .log-approved-slash,
  .log-approved-partial .log-approved-target { color: var(--amber-text); opacity: 0.7; }
  .log-approved-miss { background: var(--red-bg); color: var(--red-text); }
  .log-approved-miss .log-approved-slash,
  .log-approved-miss .log-approved-target { color: var(--red-text); opacity: 0.7; }

  .log-empty-editor { padding: 18px 14px; font-size: 12px; color: var(--text3); font-style: italic; text-align: center; }

  /* ===================== RESPONSIVE =====================
     Keep the top bar and kanban usable when the window is narrow (e.g. the app is docked
     to half the screen, or inside a narrow sidebar webview). The topbar wraps the tabs
     onto a second line; the board's 4 fixed columns collapse to an auto-fit grid that
     can become 1 or 2 columns at very narrow widths. */
  .topbar { flex-wrap: wrap; row-gap: 6px; }
  .topbar-tabs { flex-wrap: wrap; row-gap: 4px; min-width: 0; }
  .topbar-right { flex-shrink: 0; }

  @media (max-width: 900px) {
    .topbar { padding: 8px 12px; gap: 10px; }
    .topbar-tabs { margin-left: 0; width: 100%; order: 3; }
    .topbar-right { font-size: 11px; gap: 6px; }
    .today-board { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .today-wrap { padding: 12px 14px 96px; }
    .today-head { gap: 10px; }
    .today-totals { margin-left: 0; }
  }
  @media (max-width: 560px) {
    .tab-btn { padding: 5px 9px; font-size: 12px; }
    .today-board { grid-template-columns: 1fr; }
    .today-title { font-size: 16px; }
    .today-total-main-num { font-size: 17px; }
    .logo { font-size: 12.5px; }
  }

  /* ========== Sign-in overlay (Firebase Auth gate) ========== */
  .signin-overlay {
    position: fixed; inset: 0; z-index: 99999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .signin-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 40px 32px;
    width: 100%; max-width: 420px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    text-align: center;
  }
  .signin-logo { font-size: 18px; font-weight: 700; color: var(--text1); letter-spacing: -0.3px; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .signin-logo .logo-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 3px; box-shadow: 0 0 10px rgba(127,119,221,0.7); }
  .signin-logo span { color: var(--text3); font-weight: 400; }
  .signin-tagline { font-size: 13px; color: var(--text2); margin-bottom: 26px; line-height: 1.5; }
  .signin-tagline code { background: var(--bg3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent2); }
  .signin-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%;
    background: #fff; color: #1f1f1f;
    border: none; border-radius: 8px;
    padding: 11px 16px; font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.12s;
  }
  .signin-btn:hover { background: #f3f3f3; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.4); }
  .signin-btn:active { transform: translateY(0); }
  .signin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .signin-btn svg { width: 18px; height: 18px; }
  .signin-error {
    margin-top: 16px; padding: 10px 12px;
    background: var(--red-bg); color: var(--red-text);
    border-radius: 6px; font-size: 12.5px; line-height: 1.5;
    text-align: left;
  }
  .signin-footer { margin-top: 22px; font-size: 11.5px; color: var(--text3); }

  /* User chip in topbar */
  .user-chip { display: inline-flex; align-items: center; gap: 8px; padding: 4px 4px 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 100px; margin-left: 10px; font-size: 12.5px; color: var(--text2); }
  .user-chip-name { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-chip-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-dim); color: var(--accent2); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; overflow: hidden; }
  .user-chip-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-signout-btn { background: transparent; border: none; color: var(--text3); cursor: pointer; padding: 4px 6px; font-size: 11px; font-family: inherit; border-radius: 100px; transition: color 0.12s; }
  .user-signout-btn:hover { color: var(--red-text); }

  /* Role chip in user-chip + Team management table */
  .role-chip {
    display: inline-block; padding: 2px 8px; border-radius: 100px;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; border: 1px solid transparent;
    line-height: 1.4;
  }
  .role-chip-admin  { background: var(--accent-dim); color: var(--accent2); border-color: rgba(126,99,250,0.35); }
  .role-chip-pm     { background: rgba(250,199,117,0.15); color: var(--amber-text); border-color: rgba(250,199,117,0.35); }
  .role-chip-editor { background: var(--bg2); color: var(--text3); border-color: var(--border); }

  /* Team management rows in Config */
  .team-row { display: grid; grid-template-columns: 32px 1fr 200px 140px 28px; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .team-row:last-child { border-bottom: none; }
  .team-row .team-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-dim); color: var(--accent2); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; overflow: hidden; }
  .team-row .team-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .team-row .team-name { font-size: 13px; font-weight: 600; color: var(--text1); }
  .team-row .team-email { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .team-row select.team-role-select { background: var(--bg3); color: var(--text1); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: inherit; cursor: pointer; }
  .team-row select.team-role-select:disabled { opacity: 0.4; cursor: not-allowed; }
  .team-self-tag { font-size: 10px; color: var(--text3); font-style: italic; }

  /* =====================================================================
     LIGHT MODE — auto-applied when the device is set to light.
     Placed at the END of the stylesheet so its rules naturally win the
     cascade against everything declared above (matching specificity).
     ===================================================================== */
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa; --bg2: #ffffff; --bg3: #f1f0f5; --bg4: #e6e4ec;
      --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
      --text1: #1a1a22; --text2: #5a5872; --text3: #8a87a0;
      --accent: #6a60c8; --accent2: #4a40b0; --accent-dim: rgba(127,119,221,0.10);
      --green: #0a7a55; --green-bg: #d4f4e6; --green-text: #0a5040;
      --amber-bg: #fff0d5; --amber-text: #8a4f00;
      --red: #c9352a; --red-bg: #ffe0dc; --red-text: #8a2018;
      --blue-bg: #d8eaf8; --blue-text: #0a4a8a;
      --gray-bg: #ececea; --gray-text: #4a4845;
      --pink-bg: #fde0ea; --pink-text: #8a1f3f;
    }
    /* Category pills — JS sets --cat-bg/--cat-fg/--cat-bg-light/--cat-fg-light
       inline; here we read the light-mode pair instead of the dark one. */
    .cat-pill { background: var(--cat-bg-light); color: var(--cat-fg-light); }

    /* Editor avatars */
    .av-Zidni { background: #e8e6f8; color: #4a40b0; }
    .av-Patty { background: #d4f4e6; color: #0a5040; }
    .av-Sharm { background: #fff0d5; color: #8a4f00; }
    .av-Elsa  { background: #fde0ea; color: #8a1f3f; }

    /* Activity / change tags. Use background-color (NOT the shorthand) because
       .st-Assigned is also applied to <select class="status-select"> and the
       shorthand would reset background-repeat/position/size, causing the dropdown
       chevron SVG to tile across the whole pill. */
    .st-Assigned,
    .change-reassigned,
    .change-assigned,
    .tag-scheduled { background-color: #e8e6f8; color: #4a40b0; }
    .tag-notified { background-color: #d4f4e6; color: #0a5040; }
    /* Re-tint the dropdown chevron so it's visible on the light pill background. */
    .status-select.st-Draft        { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%234a4845'/></svg>"); }
    .status-select.st-Assigned     { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%234a40b0'/></svg>"); }
    .status-select.st-In_Progress  { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%238a4f00'/></svg>"); }
    .status-select.st-For_Review   { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%230a4a8a'/></svg>"); }
    .status-select.st-Needs_Revisions { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%238a2018'/></svg>"); }
    .status-select.st-Approved     { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path d='M0 0l4 5 4-5z' fill='%230a5040'/></svg>"); }

    /* Difficulty pills (Low/Moderate/High/Max) */
    .diff-Low      { background: #d4f4e6; color: #0a5040; }
    .diff-Moderate { background: #d8eaf8; color: #0a4a8a; }
    .diff-High     { background: #fff0d5; color: #8a4f00; }
    .diff-Max      { background: #ffe0dc; color: #8a2018; }

    /* QC pills */
    .qc-Missing_files  { background: #fff0d5; color: #8a4f00; }
    .qc-Missing_prices { background: #fde0ea; color: #8a1f3f; }
    .qc-Ready          { background: #d4f4e6; color: #0a5040; }

    /* Notification reason pills */
    .sent-reason-live  { background: #d4f4e6; color: #0a5040; }
    .sent-reason-blind { background: #fff0d5; color: #8a4f00; }

    /* In-review status (teal) — appears in three places */
    .wc-status-pill.st-review,
    .status-legend .wc-status-abbr.st-review,
    .log-status-badge.st-review { color: #0a6a5a; border-color: rgba(10,106,90,0.3); background: rgba(10,106,90,0.10); }

    /* Category Head QC status badge — re-tint for light mode */
    .cat-head-status-badge.st-Draft           { background: var(--bg4); color: var(--text3); }
    .cat-head-status-badge.st-For_Review      { color: #0a6a5a; border-color: rgba(10,106,90,0.3); background: rgba(10,106,90,0.10); }
    .cat-head-status-badge.st-Needs_Revisions { background: #ffe0dc; color: #8a2018; }
    .cat-head-status-badge.st-Approved        { background: #d4f4e6; color: #0a5040; }
    .cat-head-chip { background: #e8e6f8; color: #4a40b0; }

    /* Type pill — Organic */
    .type-pill-organic { background: #e8eaf2; color: #3a4458; border-color: #cfd4e0; }

    /* Today board column accent */
    .today-col-accent-todo { border-top: 3px solid #4a40b0; }

    /* Code blocks + sent-entry log bodies */
    .code-block { background: #f4f4f7; color: #0a5040; border-color: var(--border); }
    .sent-entry-body { background: #f4f4f7; color: var(--text2); border-left-color: var(--accent); }

    /* Empty-state dashed boxes */
    .today-col-empty { background: var(--bg3); }

    /* Organic sub-tally aside on the monthly panel — was a dark plum #1d1d2a */
    .month-organic-aside { background: var(--bg3); }

    /* Month-pace status dots — punch the at-risk red so it actually reads on a light bg */
    .month-panel-pace.at-risk .pace-dot { background: #dc3545; box-shadow: 0 0 6px rgba(220,53,69,0.5); }
    .month-panel-pace.behind   .pace-dot { background: #d97706; box-shadow: 0 0 6px rgba(217,119,6,0.45); }
    .month-panel-pace.on-track .pace-dot { background: #0a7a55; box-shadow: 0 0 6px rgba(10,122,85,0.45); }
    .month-panel-pace.ahead    .pace-dot { background: #6a60c8; box-shadow: 0 0 6px rgba(106,96,200,0.5); }

    /* Top-bar status indicator dot (the small "live" dot) */
    .status-dot { background: #0a7a55; box-shadow: 0 0 6px rgba(10,122,85,0.4); }

    /* Logo brand dot — stronger glow on light bg */
    .logo-dot { box-shadow: 0 0 6px rgba(106,96,200,0.5); }

    /* Sign-in card — soften shadow, give the Google button a border so it doesn't vanish */
    .signin-card { box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .signin-btn { border: 1px solid #d8d6e0; }
    .signin-btn:hover { background: #f4f4f7; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }

    /* Scrollbar thumb */
    ::-webkit-scrollbar-thumb:hover { background: #c0bdd0; }
  }
</style>
</head>
<body>

<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>
<!-- Floating layer for transient popups (sidebar right-click menu). Rendered imperatively by render() after the main app markup; kept OUTSIDE #app so it can position: fixed over everything without being clipped by the sidebar's overflow. -->
<div id="context-menu-layer"></div>
<!-- Floating feedback button \u2014 persistent across tab renders because it's a sibling of #app, not a child -->
<button id="feedback-fab" class="feedback-fab" onclick="App.showFeedbackModal()" title="Send feedback about this app" aria-label="Send feedback">&#128172;</button>

<!-- Sign-in overlay (Firebase Auth gate). Shown when user is not signed in OR signed in
     with a non-@tilt.app email. Hidden once auth resolves to a valid tilt.app user. -->
<div id="signin-overlay" class="signin-overlay" style="display:none;">
  <div class="signin-card">
    <div class="signin-logo"><div class="logo-dot"></div>Tilt <span>/ Creative Tracker</span></div>
    <div class="signin-tagline">Sign in with your <code>@tilt.app</code> Google account to access the tracker.</div>
    <button id="signin-btn" class="signin-btn" onclick="Auth.signIn()">
      <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.92v2.32A9 9 0 0 0 9 18Z"/>
        <path fill="#FBBC05" d="M3.97 10.72A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.96H.92A9 9 0 0 0 0 9c0 1.45.35 2.83.92 4.04l3.05-2.32Z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.34l2.58-2.58A8.97 8.97 0 0 0 9 0 9 9 0 0 0 .92 4.96l3.05 2.32C4.68 5.16 6.66 3.58 9 3.58Z"/>
      </svg>
      Sign in with Google
    </button>
    <div id="signin-error" class="signin-error" style="display:none;"></div>
    <div class="signin-footer">Only @tilt.app accounts are permitted. Contact an admin if you need access.</div>
  </div>
</div>

<script>
"use strict";

// =====================================================================
// Firebase init + Auth gate
// ---------------------------------------------------------------------
// Phase A of the Firebase migration: app boot is gated by Google sign-in
// restricted to @tilt.app emails. Data still persists to localStorage for
// now \u2014 Phase B replaces the data layer with Firestore.
// =====================================================================
var firebaseConfig = {
  apiKey: "AIzaSyDjFMaP63PeJoAjJaZNQARHwer--fc0_hE",
  authDomain: "tilt-project-tracker.firebaseapp.com",
  projectId: "tilt-project-tracker",
  storageBucket: "tilt-project-tracker.firebasestorage.app",
  messagingSenderId: "339809998086",
  appId: "1:339809998086:web:14d0b5394cb336855f7a87"
};
var ALLOWED_EMAIL_DOMAIN = 'tilt.app';

firebase.initializeApp(firebaseConfig);
var fbAuth = firebase.auth();
var fbDb = firebase.firestore();
fbAuth.useDeviceLanguage();

function showSigninOverlay(errorMsg) {
  var overlay = document.getElementById('signin-overlay');
  var app = document.getElementById('app');
  var fab = document.getElementById('feedback-fab');
  if (overlay) overlay.style.display = 'flex';
  if (app) app.style.display = 'none';
  if (fab) fab.style.display = 'none';
  var errEl = document.getElementById('signin-error');
  if (errEl) {
    if (errorMsg) { errEl.textContent = errorMsg; errEl.style.display = 'block'; }
    else { errEl.style.display = 'none'; errEl.textContent = ''; }
  }
}

function hideSigninOverlay() {
  var overlay = document.getElementById('signin-overlay');
  var app = document.getElementById('app');
  var fab = document.getElementById('feedback-fab');
  if (overlay) overlay.style.display = 'none';
  if (app) app.style.display = '';
  if (fab) fab.style.display = '';
  var errEl = document.getElementById('signin-error');
  if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
}

var Auth = {
  user: null,
  _booted: false,

  init: function() {
    fbAuth.onAuthStateChanged(function(fbUser) {
      if (!fbUser) {
        Auth.user = null;
        showSigninOverlay();
        return;
      }
      // Client-side @tilt.app domain enforcement. The Cloud Function trigger
      // (Phase D) will enforce this server-side too; for now this is the gate.
      var email = (fbUser.email || '').toLowerCase();
      if (!email.endsWith('@' + ALLOWED_EMAIL_DOMAIN)) {
        fbAuth.signOut().finally(function() {
          showSigninOverlay('Only @' + ALLOWED_EMAIL_DOMAIN + ' Google accounts are permitted. You signed in as ' + email + '.');
        });
        return;
      }
      Auth.user = {
        uid: fbUser.uid,
        email: email,
        displayName: fbUser.displayName || email.split('@')[0],
        photoURL: fbUser.photoURL || null
      };
      hideSigninOverlay();
      bootApp();
    });
  },

  signIn: function() {
    var btn = document.getElementById('signin-btn');
    if (btn) btn.disabled = true;
    var provider = new firebase.auth.GoogleAuthProvider();
    // `hd` filters the Google account picker to tilt.app accounts as a UX hint.
    // It is NOT a security boundary \u2014 the email check above + the Cloud
    // Function in Phase D are what actually enforce the domain restriction.
    provider.setCustomParameters({ hd: ALLOWED_EMAIL_DOMAIN, prompt: 'select_account' });
    fbAuth.signInWithPopup(provider).catch(function(err) {
      if (btn) btn.disabled = false;
      // popup-closed-by-user is benign \u2014 don't render an error toast for it
      if (err && err.code === 'auth/popup-closed-by-user') return;
      var msg = (err && err.message) ? err.message : 'Sign-in failed. Please try again.';
      var errEl = document.getElementById('signin-error');
      if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
    }).then(function() {
      if (btn) btn.disabled = false;
    });
  },

  signOut: function() {
    fbAuth.signOut().then(function() {
      // Reload to reset all in-memory state, listeners, scroll positions, etc.
      window.location.reload();
    });
  },

  current: function() { return Auth.user; }
};

// bootApp() runs the original app boot sequence \u2014 loadState, initTallyDate,
// render \u2014 wrapped in a guard so re-firing onAuthStateChanged doesn't double-boot.
// Defined here as a no-op stub; replaced at the bottom of the script after all
// app functions are declared.
function bootApp() { /* replaced at end of script */ }

// =====================================================================
// Firestore data layer (Phase B)
// ---------------------------------------------------------------------
// Single-document snapshot sync at `state/app`. saveState() writes a
// debounced snapshot up to Firestore in addition to localStorage; an
// onSnapshot listener pulls remote changes back into STATE and re-renders.
//
// suppressUpload = true while applying an incoming snapshot, so the
// resulting saveState() call doesn't echo the change back to Firestore
// and create a feedback loop.
// =====================================================================
var Fb = {
  STATE_DOC: 'state/app',
  _suppressUpload: false,
  _uploadTimer: null,
  _lastUploadJson: null,    // last-uploaded payload JSON, to skip no-op re-writes
  _firstSnapshot: true,     // first incoming snapshot triggers init/migration logic
  _unsub: null,             // unsubscribe handle for the state listener
  _ready: false,            // true once the first snapshot has been processed

  // Build the JSON snapshot we persist. Must match the shape that saveState() / loadState()
  // already use, plus a few attribution fields stamped on every write.
  //
  // IMPORTANT: this snapshot is the SHARED workspace state synced across all teammates'
  // browsers via Firestore. Per-user UI preferences (which tab you're on, which campaign
  // you've selected, which country accordions you have open, your tab arrangement, etc.)
  // must NOT be in here \u2014 those should stay in localStorage only via saveState() so they
  // survive YOUR reloads but don't override Sharm's view when she's looking at a different
  // campaign than you. See the parallel ignore-list in applySnapshot below.
  buildSnapshot: function() {
    return {
      schedulerIncludeWeekends: STATE.schedulerIncludeWeekends,
      webhookUrl: STATE.webhookUrl,
      countryWebhooks: STATE.countryWebhooks,
      categoryHeadWebhook: STATE.categoryHeadWebhook,
      qcWebhooks: STATE.qcWebhooks,
      slackWorkspace: STATE.slackWorkspace,
      editorSlackChannels: STATE.editorSlackChannels,
      editorSlackIds: STATE.editorSlackIds,
      categoryHeadSlackIds: STATE.categoryHeadSlackIds,
      pmSlackIds: STATE.pmSlackIds,
      countries: STATE.countries,
      categories: STATE.categories,
      campaigns: STATE.campaigns,
      assets: STATE.assets,
      pendingBatches: STATE.pendingBatches,
      sentNotifications: STATE.sentNotifications,
      activityLog: STATE.activityLog,
      nextAssetId: STATE.nextAssetId,
      nextCampaignId: STATE.nextCampaignId,
      nextBatchItemId: STATE.nextBatchItemId,
      _lastEditedBy: Auth.user ? Auth.user.uid : null,
      _lastEditedByName: Auth.user ? Auth.user.displayName : null,
      _lastEditedAt: Date.now()
    };
  },

  // Apply an incoming snapshot to STATE. Wrapped in suppressUpload so the resulting
  // saveState/render pass doesn't re-upload the same data.
  applySnapshot: function(data) {
    if (!data) return;
    // Don't yank the DOM out from under the user mid-click. If a <select> /
    // <input> / <textarea> is currently focused, or a pointer interaction is
    // in flight (mousedown without matching mouseup), retry shortly. This
    // prevents the "click-twice" flake where a remote snapshot fires while the
    // user is opening or picking from a dropdown — the re-render destroys the
    // dropdown DOM and the click is lost. Capped retries so a stuck focus
    // doesn't block sync forever.
    var ae = document.activeElement;
    var aeBusy = ae && (ae.tagName === 'SELECT' || ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA');
    if ((aeBusy || (typeof PtrDrag !== 'undefined' && PtrDrag.active)) && (Fb._snapshotRetries || 0) < 8) {
      Fb._pendingSnapshotData = data;
      Fb._snapshotRetries = (Fb._snapshotRetries || 0) + 1;
      clearTimeout(Fb._snapshotRetryTimer);
      Fb._snapshotRetryTimer = setTimeout(function() {
        var d = Fb._pendingSnapshotData;
        Fb._pendingSnapshotData = null;
        Fb.applySnapshot(d);
      }, 250);
      return;
    }
    Fb._snapshotRetries = 0;
    Fb._pendingSnapshotData = null;
    Fb._suppressUpload = true;
    try {
      // Per-user UI fields that must NEVER be overwritten by incoming snapshots, even if
      // a teammate's browser (running an older version) accidentally uploaded them. These
      // belong to whoever is looking at this device, not the workspace. Mirrors the
      // exclusion in buildSnapshot above.
      var PER_USER_UI_FIELDS = {
        tab: true,
        tabOrder: true,
        activeSubCampaignId: true,
        expandedCountries: true,
        sidebarCompact: true,
        sidebarMonthFilter: true,
        feedbackName: true,
        statusFilter: true,
        editorFilter: true,
        qcFilter: true,
        search: true,
        logEditor: true,
        schedulerDate: true,
        qcDismissed: true,
        noSplit: true
      };
      // Copy known fields onto STATE. Skip metadata fields prefixed with `_` and any
      // per-user UI field (so a teammate's tab/campaign/expansion choices don't override
      // ours). This is a defense-in-depth pair with buildSnapshot's deliberate exclusion.
      Object.keys(data).forEach(function(k) {
        if (k === '_lastEditedAt' || k === '_lastEditedBy' || k === '_lastEditedByName') return;
        if (PER_USER_UI_FIELDS[k]) return;
        STATE[k] = data[k];
      });
      // Mirror to localStorage as a cache so offline reloads still work. Strip per-user
      // UI fields from the incoming snapshot, then MERGE into the existing localStorage
      // copy so we don't clobber the user's locally-saved sidebar/tab state. Without
      // this merge, an immediate reload after the first snapshot would lose per-user
      // UI prefs because saveState() hadn't yet had a chance to re-write them.
      try {
        var existing = {};
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) existing = JSON.parse(raw) || {};
        } catch (_) {}
        Object.keys(data).forEach(function(k) {
          if (PER_USER_UI_FIELDS[k]) return;
          existing[k] = data[k];
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
      } catch (_) {}
      if (typeof render === 'function' && Auth._booted) render();
    } finally {
      // Defer un-suppressing past the synchronous render so any saveState calls fired
      // by render handlers don't echo up.
      setTimeout(function() { Fb._suppressUpload = false; }, 0);
    }
  },

  // Subscribe to state/app. The first snapshot drives initial load (or shows the
  // migration banner if the doc doesn't exist).
  subscribe: function(onFirstSnapshot) {
    if (Fb._unsub) { try { Fb._unsub(); } catch (_) {} }
    Fb._firstSnapshot = true;
    Fb._unsub = fbDb.doc(Fb.STATE_DOC).onSnapshot(function(snap) {
      if (Fb._firstSnapshot) {
        Fb._firstSnapshot = false;
        Fb._ready = true;
        if (snap.exists) {
          Fb.applySnapshot(snap.data());
          if (typeof onFirstSnapshot === 'function') onFirstSnapshot(true /* hadData */);
        } else {
          if (typeof onFirstSnapshot === 'function') onFirstSnapshot(false /* hadData */);
        }
      } else {
        // Subsequent snapshots: only apply if originated remotely (not our own write).
        // hasPendingWrites is true when this snapshot reflects a local pending write.
        var meta = snap.metadata || {};
        if (meta.hasPendingWrites) return;
        if (snap.exists) Fb.applySnapshot(snap.data());
      }
    }, function(err) {
      console.warn('[Fb] state/app listener error:', err);
      // Graceful fallback: if Firestore is unreachable (most commonly because
      // security rules haven't been updated yet), fall back to localStorage so
      // the app is at least usable. The user sees a persistent error toast
      // explaining what to fix.
      if (Fb._firstSnapshot) {
        Fb._firstSnapshot = false;
        Fb._ready = false; // do NOT enable uploads while Firestore is broken
        var localRaw = null;
        try { localRaw = localStorage.getItem(STORAGE_KEY); } catch (_) {}
        if (localRaw) loadState();
        window._firestoreUnreachable = true;
        window._firestoreError = (err && err.code) ? err.code : (err && err.message) || 'unknown';
        if (typeof render === 'function' && Auth._booted) render();
        if (typeof toast === 'function') {
          var msg = 'Firestore unreachable (' + window._firestoreError + '). Running offline-only. Check Firestore security rules in Firebase console.';
          toast(msg, 'error');
        }
      }
    });
  },

  // Debounced upload. Coalesces rapid saveState() calls into one write per ~600ms.
  scheduleUpload: function() {
    if (Fb._suppressUpload) return;
    if (!Auth.user) return;
    if (!Fb._ready) return; // don't write until we've seen the first snapshot
    if (Fb._uploadTimer) clearTimeout(Fb._uploadTimer);
    Fb._uploadTimer = setTimeout(Fb.uploadNow, 600);
  },

  uploadNow: function() {
    if (Fb._uploadTimer) { clearTimeout(Fb._uploadTimer); Fb._uploadTimer = null; }
    if (!Auth.user) return Promise.resolve();
    var snap = Fb.buildSnapshot();
    var json = JSON.stringify(snap);
    if (json === Fb._lastUploadJson) return Promise.resolve();
    Fb._lastUploadJson = json;
    return fbDb.doc(Fb.STATE_DOC).set(snap).catch(function(err) {
      console.warn('[Fb] upload failed:', err);
      // Reset the dedup hash so the next saveState retries.
      Fb._lastUploadJson = null;
    });
  },

  // One-time migration: explicitly write current localStorage STATE up to Firestore.
  // Used by the "Migrate now" button when Firestore is empty and localStorage has data.
  migrateLocalToFirestore: function() {
    if (!Auth.user) return Promise.reject(new Error('Not signed in'));
    var snap = Fb.buildSnapshot();
    snap._migratedFromLocalAt = Date.now();
    snap._migratedBy = Auth.user.uid;
    return fbDb.doc(Fb.STATE_DOC).set(snap);
  },

  // Upsert the user's profile doc on first sign-in. Bootstrap admins listed below
  // are auto-promoted to role 'admin' (also covers existing docs that landed as
  // 'editor' before role bootstrap was wired up). Everyone else lands as 'editor'.
  BOOTSTRAP_ADMIN_EMAILS: ['elsa@tilt.app'],

  ensureUserDoc: function() {
    if (!Auth.user) return Promise.resolve();
    var ref = fbDb.collection('users').doc(Auth.user.uid);
    var isBootstrapAdmin = Fb.BOOTSTRAP_ADMIN_EMAILS.indexOf(Auth.user.email) >= 0;
    return ref.get().then(function(doc) {
      if (!doc.exists) {
        return ref.set({
          email: Auth.user.email,
          displayName: Auth.user.displayName,
          photoURL: Auth.user.photoURL || null,
          role: isBootstrapAdmin ? 'admin' : 'editor',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      }
      // Existing doc: if user is on the bootstrap admin list but their stored
      // role is anything other than 'admin', upgrade them. Idempotent.
      var data = doc.data() || {};
      if (isBootstrapAdmin && data.role !== 'admin') {
        return ref.update({ role: 'admin' });
      }
      // Also keep displayName / photoURL fresh in case Google profile changed.
      var patch = {};
      if (Auth.user.displayName && data.displayName !== Auth.user.displayName) patch.displayName = Auth.user.displayName;
      if (Auth.user.photoURL && data.photoURL !== Auth.user.photoURL) patch.photoURL = Auth.user.photoURL;
      if (Object.keys(patch).length > 0) return ref.update(patch);
    }).catch(function(err) {
      console.warn('[Fb] ensureUserDoc failed:', err);
    });
  },

  // Subscribe to the current user's profile doc so role changes (e.g. an admin
  // promoting them) propagate live without needing a refresh.
  _myProfileUnsub: null,
  subscribeMyProfile: function() {
    if (!Auth.user) return;
    if (Fb._myProfileUnsub) { try { Fb._myProfileUnsub(); } catch (_) {} }
    Fb._myProfileUnsub = fbDb.collection('users').doc(Auth.user.uid).onSnapshot(function(doc) {
      if (!doc.exists) return;
      var data = doc.data() || {};
      var prevRole = Auth.user.role;
      Auth.user.role = data.role || 'editor';
      // Dynamically attach / detach the all-users listener when role flips
      // across the admin boundary, so promotions and demotions take effect
      // without a refresh.
      if (Auth.user.role === 'admin' && prevRole !== 'admin') {
        Fb.subscribeAllUsers();
      } else if (Auth.user.role !== 'admin' && prevRole === 'admin') {
        Fb.unsubscribeAllUsers();
      }
      // If the role actually changed and the app is booted, re-render so tab
      // visibility / role chip update immediately.
      if (prevRole !== Auth.user.role && Auth._booted && typeof render === 'function') {
        render();
      }
    });
  },

  // Subscribe to the entire users collection. Only admins need this (it powers
  // the Team management section in Config). Stored in window._allUsers so the
  // Config view can render directly from it.
  _allUsersUnsub: null,
  subscribeAllUsers: function() {
    if (Fb._allUsersUnsub) { try { Fb._allUsersUnsub(); } catch (_) {} }
    Fb._allUsersUnsub = fbDb.collection('users').onSnapshot(function(snap) {
      window._allUsers = snap.docs.map(function(d) {
        var data = d.data() || {};
        data.uid = d.id;
        return data;
      });
      // Sort by createdAt asc, so the founding admin (Elsa) is at the top.
      window._allUsers.sort(function(a, b) {
        var ta = (a.createdAt && a.createdAt.toMillis) ? a.createdAt.toMillis() : 0;
        var tb = (b.createdAt && b.createdAt.toMillis) ? b.createdAt.toMillis() : 0;
        return ta - tb;
      });
      if (Auth._booted && typeof render === 'function' && STATE.tab === 'config') render();
    }, function(err) {
      console.warn('[Fb] users listener error:', err);
    });
  },
  unsubscribeAllUsers: function() {
    if (Fb._allUsersUnsub) { try { Fb._allUsersUnsub(); } catch (_) {} Fb._allUsersUnsub = null; }
    window._allUsers = null;
  },

  // Update another user's role. Admin-only (Firestore rules enforce this in Phase D).
  setUserRole: function(uid, role) {
    if (!Auth.user || Auth.user.role !== 'admin') {
      return Promise.reject(new Error('Only admins can change roles'));
    }
    if (['editor', 'pm', 'admin'].indexOf(role) < 0) {
      return Promise.reject(new Error('Invalid role: ' + role));
    }
    return fbDb.collection('users').doc(uid).update({ role: role });
  }
};

window.addEventListener('error', function(e) {
  // Browsers report cross-origin script errors with no useful info \u2014 the message is
  // the literal string "Script error.", line/col are 0, and e.error is null. These
  // come from things like Slack's CORS pre-flight rejection during a fetch, browser
  // extensions, or third-party scripts. Wiping the app for these is overkill since
  // we have no actionable info AND the app itself is fine.
  // Only show the runtime error screen for SAME-ORIGIN errors where we have real
  // information to display \u2014 otherwise log to console and let the app keep running.
  var isOpaqueCrossOrigin = (
    (!e.message || e.message === 'Script error.' || /^Script error/.test(e.message)) &&
    !e.error &&
    (!e.lineno || e.lineno === 0)
  );
  if (isOpaqueCrossOrigin) {
    console.warn('[ignored cross-origin error]', e);
    return; // app stays up
  }
  var app = document.getElementById('app');
  if (app) {
    app.innerHTML = '<div style="padding:40px;color:#f09595;font-family:monospace;font-size:12px;">' +
      '<h2 style="margin-bottom:12px;color:#fff;font-family:sans-serif;">Runtime Error</h2>' +
      '<div><strong>Message:</strong> ' + (e.message || '(unknown)') + '</div>' +
      '<div><strong>Line:</strong> ' + (e.lineno || '?') + ':' + (e.colno || '?') + '</div>' +
      (e.error && e.error.stack ? '<pre style="margin-top:12px;white-space:pre-wrap;">' + e.error.stack + '</pre>' : '') +
      '<div style="margin-top:16px;color:#888;font-family:sans-serif;"><a href="javascript:location.reload()" style="color:#aab;">Reload</a> to recover.</div>' +
    '</div>';
  }
});

// Same treatment for unhandled promise rejections \u2014 these often come from network
// failures (fetch to Slack, Firebase calls under poor connectivity) and shouldn't
// nuke the entire app. The local catch handlers in each promise chain already
// surface user-facing toasts where appropriate.
window.addEventListener('unhandledrejection', function(e) {
  console.warn('[unhandled promise rejection]', e.reason);
  // Don't preventDefault \u2014 still lets the browser log the rejection so we have
  // the trace in devtools, but we don't surface a UI-breaking error screen.
});

// Returns the assigned head's name for a given category name, or '' if none.
// Used for the Category Head QC column display. Case-insensitive — legacy
// rows in the wild may have category stored as "LUXURY" (uppercase) while
// CATEGORY_HEADS uses titlecase keys; this normalizes both sides.
function getCategoryHead(category) {
  if (!category) return '';
  var direct = CATEGORY_HEADS[category];
  if (direct) return direct;
  var keyLower = String(category).toLowerCase();
  for (var k in CATEGORY_HEADS) {
    if (Object.prototype.hasOwnProperty.call(CATEGORY_HEADS, k) && k.toLowerCase() === keyLower) {
      return CATEGORY_HEADS[k];

function todayISO() { return new Date().toISOString().slice(0, 10); }

// Returns { start, end } as YYYY-MM-DD ISO strings covering the current ISO week
// (Monday \u2192 Sunday). Used by the This Week row on the Board tab to filter assets
// whose relevant dates (assignedAt, estDelivery, dateApproved) fall inside the
// current week. The range is inclusive on both ends.
function getThisWeekRange() {
  var now = new Date();
  var dow = now.getDay(); // 0=Sun, 1=Mon, ..., 6=Sat
  // Days since Monday: Sunday maps back to 6 days ago so the week is Mon\u2013Sun.
  var daysFromMon = (dow + 6) % 7;
  var mon = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysFromMon);
  var sun = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + 6);
  function fmt(d) {
    var m = d.getMonth() + 1, day = d.getDate();
    return d.getFullYear() + '-' + (m < 10 ? '0' + m : m) + '-' + (day < 10 ? '0' + day : day);
  }
  return { start: fmt(mon), end: fmt(sun) };
}

// ===================== TARGETS / GOALS =====================
// Monthly approval goal (200 videos/month) drives both the monthly progress bar on
// the Board and the daily pace indicator on the "Approved today" tally. The daily
// target is derived from the month target divided by the month's workdays (Mon\u2013Fri),
// so a 20-workday month \u2192 10/day, a 22-workday month \u2192 ~9/day.
var MONTHLY_APPROVAL_TARGET = 200;
var DAILY_APPROVAL_TARGET = 10; // Explicit daily goal (UK Paid Ads) \u2014 keeps the pace pill stable regardless of month length.
var DAILY_EDITOR_APPROVAL_TARGET = 3; // Per-editor daily minimum used by the Daily Log tab for accountability colouring.

// Returns { start, end, year, month, label } describing the current calendar month.
// 'month' is 0-indexed to match Date API. 'label' is "April 2026".
function getThisMonthRange() {
  var now = new Date();
  var y = now.getFullYear();
  var m = now.getMonth();
  var first = new Date(y, m, 1);
  var last = new Date(y, m + 1, 0); // day 0 of next month = last day of this month
  function fmt(d) {
    var mm = d.getMonth() + 1, dd = d.getDate();
    return d.getFullYear() + '-' + (mm < 10 ? '0' + mm : mm) + '-' + (dd < 10 ? '0' + dd : dd);
  }
  var MONTH_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return {
    start: fmt(first), end: fmt(last),
    year: y, month: m,
    label: MONTH_LONG[m] + ' ' + y
  };
}

// Count approvals whose dateApproved lies inside a [startISO, endISO] range (inclusive).
// Only counts assets currently in Approved status (so items that were Approved then
// moved back to Needs Revisions don't inflate the tally).
// Optional `filterFn(asset, campaign)` lets callers scope the count (e.g. only UK
// Paid Ads toward the monthly 200 goal).
function countApprovedInRange(startISO, endISO, filterFn) {
  var n = 0;
  STATE.assets.forEach(function(a) {
    if (a.status !== 'Approved') return;
    if (!a.dateApproved) return;
    if (a.dateApproved < startISO || a.dateApproved > endISO) return;
    if (filterFn) {
      var camp = findCampaignById(a.campaignId);
      if (!camp) return;
      if (!filterFn(a, camp)) return;
    }
    n++;
  });
  return n;
}

// The 200/month goal is specifically UK Paid Ads. Organic and non-UK approvals
// are tracked separately (no monthly target).
function isPaidAdsUKApproval(asset, camp) {
  if (!camp) return false;
  if (camp.country !== 'UK') return false;
  var t = camp.type || DEFAULT_CAMPAIGN_TYPE;
  return t === 'Paid Ads';
}
function isOrganicApproval(asset, camp) {
  if (!camp) return false;
  return (camp.type || DEFAULT_CAMPAIGN_TYPE) === 'Organic';
}

// Number of weekdays (Mon\u2013Fri) inside a date range, inclusive on both ends. Used to
// derive the daily target from the monthly target.
function countWorkdays(startISO, endISO) {
  var s = new Date(startISO + 'T12:00:00');
  var e = new Date(endISO + 'T12:00:00');
  var n = 0;
  for (var d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
    var dow = d.getDay(); // 0=Sun, 6=Sat
    if (dow !== 0 && dow !== 6) n++;
  }
  return n;
}

// Breaks the current month into week-rows that each END on a Friday. Weeks
// before and after the month boundaries are clipped to the month (so the first
// "week" might be a Wed\u2013Fri stub, and the last might be a Mon\u2013<last-day-of-month>
// stub). Each row has { label, start, end, approvals, isCurrent, isFuture }.
// This matches the user's mental model of "every Friday add up the week's
// confirmed approvals."
function getMonthlyWeeklyBreakdown(filterFn) {
  var range = getThisMonthRange();
  var today = todayISO();
  var MONTH_SHORT_LOCAL = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtISO(d) {
    var mm = d.getMonth() + 1, dd = d.getDate();
    return d.getFullYear() + '-' + (mm < 10 ? '0' + mm : mm) + '-' + (dd < 10 ? '0' + dd : dd);
  }
  function fmtChip(d) {
    return MONTH_SHORT_LOCAL[d.getMonth()] + ' ' + d.getDate();
  }
  var first = new Date(range.start + 'T12:00:00');
  var last = new Date(range.end + 'T12:00:00');
  var weeks = [];
  // Walk day-by-day. Accumulate into the current week bucket; close the bucket when
  // we hit a Friday OR when we finish the last day of the month (to catch a partial
  // trailing week that hasn't reached Friday yet).
  var weekStart = new Date(first);
  for (var d = new Date(first); d <= last; d.setDate(d.getDate() + 1)) {
    var dow = d.getDay(); // 0=Sun...5=Fri...6=Sat
    var isFriday = dow === 5;
    var isMonthEnd = d.getTime() === last.getTime();
    if (isFriday || isMonthEnd) {
      var s = fmtISO(weekStart);
      var e = fmtISO(d);
      weeks.push({
        start: s,
        end: e,
        label: fmtChip(weekStart) + '\u2013' + fmtChip(d),
        approvals: countApprovedInRange(s, e, filterFn),
        isCurrent: today >= s && today <= e,
        isFuture: s > today
      });
      // Start a new week on the next day (unless we're done).
      weekStart = new Date(d);
      weekStart.setDate(weekStart.getDate() + 1);
    }
  }
  return weeks;
}

// ===================== DATE HELPERS =====================
// Asset dates (estDelivery, dateApproved) go through this trio. Internally we store
// the ISO string 'YYYY-MM-DD' (which <input type="date"> reads/writes natively).
// Display uses '25 Apr 2026'. Old data used 'Apr 25, 2026' \u2014 parseDate handles both so
// loadState's migration can normalize everything. MONTH_SHORT is declared earlier
// (above STATE) so the seed-data path can call these helpers during boot.

// Return a Date object (at noon UTC to dodge timezone-edge issues) from a string.
// Accepts: ISO 'YYYY-MM-DD', 'Apr 25, 2026', '25 Apr 2026', or an already-parseable date.
// Returns null for empty/unparseable input.
function parseDate(str) {
  if (!str) return null;
  if (str instanceof Date) return isNaN(str) ? null : str;
  var s = String(str).trim();
  if (!s) return null;
  // ISO 'YYYY-MM-DD' \u2014 cheap path
  var iso = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) {
    var d = new Date(Date.UTC(+iso[1], +iso[2] - 1, +iso[3], 12, 0, 0));
    return isNaN(d) ? null : d;
  }
  // 'Apr 25, 2026' or '25 Apr 2026' \u2014 match month name on either side of the day
  var monName = '(' + MONTH_SHORT.join('|') + ')';
  var m1 = s.match(new RegExp('^' + monName + '\\s+(\\d{1,2}),?\\s+(\\d{4})$', 'i'));
  var m2 = s.match(new RegExp('^(\\d{1,2})\\s+' + monName + ',?\\s+(\\d{4})$', 'i'));
  var year, monthIdx, day;
  if (m1) {
    monthIdx = MONTH_SHORT.findIndex(function(mn) { return mn.toLowerCase() === m1[1].toLowerCase(); });
    day = +m1[2]; year = +m1[3];
  } else if (m2) {
    day = +m2[1];
    monthIdx = MONTH_SHORT.findIndex(function(mn) { return mn.toLowerCase() === m2[2].toLowerCase(); });
    year = +m2[3];
  } else {
    // Last-ditch fallback: let the browser try. Acceptable since this only runs on migration.
    var fallback = new Date(s);
    return isNaN(fallback) ? null : fallback;
  }
  if (monthIdx < 0) return null;
  var dd = new Date(Date.UTC(year, monthIdx, day, 12, 0, 0));
  return isNaN(dd) ? null : dd;
}

// Format a date value for display: '25 Apr 2026'. Accepts Date, ISO, or legacy strings.
// Returns '' for empty/unparseable input.
function formatDate(value) {
  var d = (value instanceof Date) ? value : parseDate(value);
  if (!d) return '';
  return d.getUTCDate() + ' ' + MONTH_SHORT[d.getUTCMonth()] + ' ' + d.getUTCFullYear();
}

// Convert a date value (Date / ISO / legacy string) to an ISO 'YYYY-MM-DD' string
// suitable for <input type="date">. Returns '' if unparseable.
function toISODate(value) {
  var d = (value instanceof Date) ? value : parseDate(value);
  if (!d) return '';
  var y = d.getUTCFullYear();
  var m = String(d.getUTCMonth() + 1).padStart(2, '0');
  var dd = String(d.getUTCDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

function timeStamp() {
  var d = new Date();
  var hh = String(d.getHours()); if (hh.length < 2) hh = '0' + hh;
  var mm = String(d.getMinutes()); if (mm.length < 2) mm = '0' + mm;
  return hh + ':' + mm;
}

function logAction(tag, msg) {
  // Attach the signed-in user's identity so every log entry carries attribution
  // (Firestore-mode requirement). Falls back to "system" when called pre-auth
  // (e.g. during initial state migration).
  var u = (typeof Auth !== 'undefined' && Auth.current) ? Auth.current() : null;
  var entry = {
    time: timeStamp(),
    tag: tag,
    msg: msg,
    userId: u ? u.uid : null,
    userName: u ? (u.displayName || u.email || 'system') : 'system',
    userEmail: u ? u.email : null,
    ts: Date.now()
  };
  STATE.activityLog.unshift(entry);
  // Cap in-memory log to a generous size now that Firestore retains the full history.
  if (STATE.activityLog.length > 200) STATE.activityLog.pop();
  console.log('[activity]', '[' + tag.toUpperCase() + ']', entry.userName + ': ' + msg);
}
